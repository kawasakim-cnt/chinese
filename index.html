<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>時代華語① フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #2d3748;
  }

  /* ===== ヘッダー ===== */
  .header {
    background: #2b6cb0;
    color: white;
    padding: 16px 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* ===== 画面切り替え ===== */
  .screen { display: none; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===== 課選択画面 ===== */
  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .lesson-btn {
    padding: 14px 0;
    border: 2px solid #bee3f8;
    border-radius: 10px;
    background: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #2b6cb0;
  }
  .lesson-btn.selected {
    background: #2b6cb0;
    color: white;
    border-color: #2b6cb0;
  }
  .lesson-btn .count {
    display: block;
    font-size: 11px;
    font-weight: normal;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* ===== フラッシュカード画面 ===== */
  .progress-bar-wrap {
    background: #e2e8f0;
    border-radius: 999px;
    height: 8px;
    margin-bottom: 8px;
  }
  .progress-bar {
    background: #2b6cb0;
    height: 8px;
    border-radius: 999px;
    transition: width 0.3s;
  }
  .progress-text {
    text-align: center;
    font-size: 13px;
    color: #718096;
    margin-bottom: 20px;
  }
  .card-container {
    perspective: 1000px;
    height: 300px;
    margin-bottom: 24px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-front {
    background: white;
  }
  .card-back {
    background: #ebf8ff;
    transform: rotateY(180deg);
  }
  .card-lesson-badge {
    position: absolute;
    top: 14px;
    right: 16px;
    background: #bee3f8;
    color: #2b6cb0;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .card-pos {
    position: absolute;
    top: 14px;
    left: 16px;
    color: #a0aec0;
    font-size: 12px;
  }
  .card-pos-badge {
    margin-top: 14px;
    background: #e9d8fd;
    color: #6b46c1;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 14px;
    border-radius: 999px;
  }
  .card-chinese {
    font-size: 72px;
    font-weight: bold;
    color: #1a202c;
    line-height: 1.1;
    text-align: center;
  }
  .card-hint {
    margin-top: 16px;
    color: #a0aec0;
    font-size: 14px;
  }
  .card-pinyin {
    font-size: 26px;
    color: #2b6cb0;
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .card-ja {
    font-size: 22px;
    color: #2d3748;
    text-align: center;
    line-height: 1.5;
  }
  .card-example {
    margin-top: 10px;
    padding: 8px 10px 0;
    border-top: 1px solid #e2e8f0;
    text-align: left;
    line-height: 1.6;
    width: 100%;
  }
  .ex-zh {
    font-size: 18px;
    color: #2d3748;
  }
  .ex-py {
    font-size: 15px;
    color: #718096;
  }
  .ex-ja {
    font-size: 15px;
    color: #718096;
  }

  /* ===== 音声ボタン ===== */
  .btn-speak {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    padding: 4px 12px;
  }
  .btn-speak:active { opacity: 1; }

  /* ===== ボタン群 ===== */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn-wrong {
    flex: 1;
    padding: 16px;
    background: white;
    border: 2px solid #fc8181;
    color: #e53e3e;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-wrong:hover { background: #fff5f5; }
  .btn-correct {
    flex: 1;
    padding: 16px;
    background: #2b6cb0;
    border: 2px solid #2b6cb0;
    color: white;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-correct:hover { background: #2c5282; }
  .flip-hint {
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
  }
  .action-buttons.hidden { opacity: 0; pointer-events: none; }

  /* ===== 結果画面 ===== */
  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #2b6cb0;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 24px auto;
    font-size: 14px;
  }
  .result-circle .score {
    font-size: 42px;
    font-weight: bold;
    line-height: 1;
  }
  .result-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-box {
    flex: 1;
    background: white;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-box .stat-num {
    font-size: 32px;
    font-weight: bold;
  }
  .stat-box .stat-label { font-size: 13px; color: #718096; margin-top: 4px; }
  .stat-box.correct .stat-num { color: #2b6cb0; }
  .stat-box.wrong .stat-num { color: #e53e3e; }
  .result-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-retry {
    width: 100%;
    padding: 16px;
    background: #2b6cb0;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-retry-wrong {
    width: 100%;
    padding: 16px;
    background: white;
    color: #e53e3e;
    border: 2px solid #fc8181;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-back {
    width: 100%;
    padding: 14px;
    background: white;
    color: #718096;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }
  .result-title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">時代華語① フラッシュカード</div>

<!-- 課選択画面 -->
<div id="screen-select" class="screen active">
  <div class="lesson-grid" id="lesson-grid"></div>
</div>

<!-- フラッシュカード画面 -->
<div id="screen-card" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>

  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <span class="card-lesson-badge" id="card-lesson"></span>
        <div class="card-chinese" id="card-chinese"></div>
        <div class="card-hint">タップして答えを見る</div>
        <button class="btn-speak" onclick="event.stopPropagation(); speak()">🔊</button>
      </div>
      <div class="card-face card-back">
        <span class="card-lesson-badge" id="card-lesson-back"></span>
        <div class="card-chinese" style="font-size:52px; margin-bottom:8px;" id="card-chinese-back"></div>
        <div class="card-pinyin" id="card-pinyin"></div>
        <div class="card-ja" id="card-ja"></div>
        <div class="card-example" id="card-example"></div>
        <div class="card-pos-badge" id="card-pos-back"></div>
        <button class="btn-speak" onclick="event.stopPropagation(); speak()">🔊</button>
      </div>
    </div>
  </div>

  <div class="flip-hint" id="flip-hint">タップして答えを見る</div>
  <button class="btn-back" style="margin-top:16px; width:100%;" onclick="goSelect()">← メニューに戻る</button>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen">
  <div class="result-title">お疲れ様でした！</div>
  <div class="result-buttons">
    <button class="btn-retry" onclick="retryAll()">もう一度</button>
    <button class="btn-back" style="margin-top:12px;" onclick="goSelect()">← 課選択に戻る</button>
  </div>
</div>

  {"lesson": "L11", "trad": "網站", "pinyin": "wǎngzhàn", "pos": "N", "ja": "Webサイト", "ex_zh": "這個網站有很多有用的資訊。", "ex_py": "Zhège wǎngzhàn yǒu hěn duō yǒuyòng de zīxùn.", "ex_ja": "このWebサイトにはたくさん役立つ情報があります。"}, {"lesson": "L11", "trad": "網址", "pinyin": "wǎngzhǐ", "pos": "N", "ja": "ウェブアドレス。リンク", "ex_zh": "你可以告訴我那個網站的網址嗎？", "ex_py": "Nǐ kěyǐ gàosù wǒ nà ge wǎngzhàn de wǎngzhǐ ma?", "ex_ja": "そのWebサイトのURLを教えてもらえますか？"}, {"lesson": "L11", "trad": "留言", "pinyin": "liúyán", "pos": "Vi", "ja": "メッセージを残す", "ex_zh": "如果他不能接電話，你就留言吧！", "ex_py": "Rúguǒ tā bù néng jiē diànhuà, nǐ jiù liúyán ba!", "ex_ja": "もし彼が電話に出られなければ、メッセージを残してください！"}, {"lesson": "L11", "trad": "相片", "pinyin": "xiàngpiàn", "pos": "N", "ja": "写真", "ex_zh": "我想把這張相片放到網路上。", "ex_py": "Wǒ xiǎng bǎ zhè zhāng xiàngpiàn fàng dào wǎnglù shàng.", "ex_ja": "この写真をインターネットに載せたいです。"}, {"lesson": "L11", "trad": "照片", "pinyin": "zhàopiàn", "pos": "N", "ja": "写真", "ex_zh": "我去旅行的時候，拍了很多照片。", "ex_py": "Wǒ qù lǚxíng de shíhòu, pāi le hěn duō zhàopiàn.", "ex_ja": "旅行に行った時、たくさん写真を撮りました。"},
  {"lesson": "L11", "trad": "文章", "pinyin": "wénzhāng", "pos": "N", "ja": "記事", "ex_zh": "他寫的文章都很有趣，我很喜歡看。", "ex_py": "Tā xiě de wénzhāng dōu hěn yǒuqù, wǒ hěn xǐhuān kàn.", "ex_ja": "彼が書く記事はどれも面白くて、よく読みます。"}, {"lesson": "L11", "trad": "見面", "pinyin": "jiànmiàn", "pos": "V-sep", "ja": "会う", "ex_zh": "你這個週末有空嗎？我想跟你見面。", "ex_py": "Nǐ zhège zhōumò yǒukòng ma? Wǒ xiǎng gēn nǐ jiànmiàn.", "ex_ja": "今週末は空いていますか？あなたに会いたいです。"}, {"lesson": "L11", "trad": "認識", "pinyin": "rènshì", "pos": "Vpt", "ja": "誰かと知り合うために", "ex_zh": "我上個禮拜認識了一位中文老師。", "ex_py": "Wǒ shàng ge lǐbài rènshì le yī wèi zhōngwén lǎoshī.", "ex_ja": "先週、中国語の先生と知り合いになりました。"}, {"lesson": "L11", "trad": "開始", "pinyin": "kāishǐ", "pos": "Vp", "ja": "始める;始める", "ex_zh": "電影就要開始了，快進來吧！", "ex_py": "Diànyǐng jiùyào kāishǐ le, kuài jìnlái ba!", "ex_ja": "映画がもうすぐ始まりますよ、早く入って！"}, {"lesson": "L11", "trad": "還沒", "pinyin": "hái méi", "pos": "Adv", "ja": "まだ", "ex_zh": "A：你現在要回宿舍嗎？B：還沒，我要先去吃飯再回宿舍。", "ex_py": "A: Nǐ xiànzài yào huí sùshè ma? B: Hái méi, wǒ yào xiān qù chīfàn zài huí sùshè.", "ex_ja": "A：今寮に帰りますか？B：まだです。先ご飯を食べてから寮に帰ります。"},
  {"lesson": "L11", "trad": "還", "pinyin": "hái", "pos": "Adv", "ja": "まだ", "ex_zh": "他上個禮拜生病了，現在還在咳嗽。", "ex_py": "Tā shàng ge lǐbài shēngbìng le, xiànzài hái zài késou.", "ex_ja": "先週病気になって、今もまだ咳をしています。"}, {"lesson": "L11", "trad": "已經", "pinyin": "yǐjīng", "pos": "Adv", "ja": "すでに", "ex_zh": "A：你寫功課了嗎？B：我已經寫了。", "ex_py": "A: Nǐ xiě gōngkè le ma? B: Wǒ yǐjīng xiě le.", "ex_ja": "A：宿題はやりましたか？B：もうやりました。"}, {"lesson": "L11", "trad": "就要", "pinyin": "jiùyào", "pos": "Adv", "ja": "もうすぐだ", "ex_zh": "電影就要開始了，快進來吧！", "ex_py": "Diànyǐng jiùyào kāishǐ le, kuài jìnlái ba!", "ex_ja": "映画がもうすぐ始まりますよ、早く入って！"}, {"lesson": "L11", "trad": "約", "pinyin": "yuē", "pos": "V", "ja": "約束をする", "ex_zh": "週末我有空，要約朋友一起去玩。", "ex_py": "Zhōumò wǒ yǒukòng, yào yuē péngyǒu yīqǐ qù wán.", "ex_ja": "週末は空いているので、友達を誘って一緒に遊びに行きたいです。"}, {"lesson": "L11", "trad": "機會", "pinyin": "jīhuì", "pos": "N", "ja": "チャンス", "ex_zh": "我很少有機會說中文，所以需要多練習。", "ex_py": "Wǒ hěn shǎo yǒu jīhuì shuō zhōngwén, suǒyǐ xūyào duō liànxí.", "ex_ja": "中国語を話す機会がほとんどないので、もっと練習する必要があります。"},
  {"lesson": "L11", "trad": "計畫", "pinyin": "jìhuà", "pos": "N", "ja": "プラン", "ex_zh": "你這個週末有什麼計畫？", "ex_py": "Nǐ zhège zhōumò yǒu shénme jìhuà?", "ex_ja": "今週末は何か計画がありますか？"}, {"lesson": "L11", "trad": "可能", "pinyin": "kěnéng", "pos": "Vaux", "ja": "多分;おそらく", "ex_zh": "我打電話給她，她沒接，可能在睡覺。", "ex_py": "Wǒ dǎ diànhuà gěi tā, tā méi jiē, kěnéng zài shuìjiào.", "ex_ja": "電話したら出なかったので、たぶん寝ていたのかもしれません。"}, {"lesson": "L11", "trad": "以後", "pinyin": "yǐhòu", "pos": "N", "ja": "将来", "ex_zh": "我希望以後可以去他家玩。", "ex_py": "Wǒ xīwàng yǐhòu kěyǐ qù tā jiā wán.", "ex_ja": "将来、彼の家に遊びに行けることを願っています。"}, {"lesson": "L11", "trad": "以前", "pinyin": "yǐqián", "pos": "N", "ja": "過去に", "ex_zh": "以前妹妹很不喜歡穿裙子，現在她覺得穿裙子很舒服。", "ex_py": "Yǐqián mèimei hěn bù xǐhuān chuān qúnzi, xiànzài tā juéde chuān qúnzi hěn shūfu.", "ex_ja": "以前は妹がスカートを嫌いでしたが、今はスカートが快適だと思っています。"}, {"lesson": "L11", "trad": "差不多", "pinyin": "chábuduō", "pos": "Adv", "ja": "について;約", "ex_zh": "A：你每天幾點起床？B：差不多七點。", "ex_py": "A: Nǐ měi tiān jǐ diǎn qǐchuáng? B: Chàbuduō qī diǎn.", "ex_ja": "A：毎日何時に起きますか？B：だいたい7時です。"},
  {"lesson": "L11", "trad": "出去", "pinyin": "chūqù", "pos": "Vi", "ja": "出かける", "ex_zh": "天氣很好，我們一起出去走走吧！", "ex_py": "Tiānqì hěn hǎo, wǒmen yīqǐ chūqù zǒuzǒu ba!", "ex_ja": "天気がいいので、一緒に外へ出かけましょう！"}, {"lesson": "L11", "trad": "看到", "pinyin": "kàndào", "pos": "V", "ja": "（たまたま）見る", "ex_zh": "我常常在電視上看到那位有名的醫生。", "ex_py": "Wǒ chángcháng zài diànshì shàng kàndào nà wèi yǒumíng de yīshēng.", "ex_ja": "テレビであの有名な医者をよく見かけます。"}, {"lesson": "L11", "trad": "但是", "pinyin": "dànshì", "pos": "Conj", "ja": "しかし", "ex_zh": "這個香蕉蛋糕不好看，但是很好吃。", "ex_py": "Zhège xiāngjiāo dàngāo bù hǎokàn, dànshì hěn hǎo chī.", "ex_ja": "このバナナケーキは見た目はよくないですが、とても美味しいです。"}, {"lesson": "L11", "trad": "所以", "pinyin": "suǒyǐ", "pos": "Conj", "ja": "したがって;それで", "ex_zh": "他生病了，所以不能來上課。", "ex_py": "Tā shēngbìng le, suǒyǐ bù néng lái shàngkè.", "ex_ja": "彼は病気になったので、授業に来られません。"}, {"lesson": "L11", "trad": "這樣", "pinyin": "zhèyàng", "pos": "Vs", "ja": "このような;こちらです", "ex_zh": "這家餐廳賣很多蛋糕和冰淇淋，這樣的甜點我都喜歡。", "ex_py": "Zhè jiā cāntīng mài hěn duō dàngāo hé bīngqílín, zhèyàng de tiándiǎn wǒ dōu xǐhuān.", "ex_ja": "このレストランはケーキやアイスクリームをたくさん売っていて、こういったデザートが全部好きです。"},
  {"lesson": "L11", "trad": "特別", "pinyin": "tèbié", "pos": "Vs", "ja": "特別;特定の", "ex_zh": "她今天穿得很特別，大家都看她。", "ex_py": "Tā jīntiān chuān de hěn tèbié, dàjiā dōu kàn tā.", "ex_ja": "彼女は今日とても個性的な服装をしているので、みんなが見ています。"}, {"lesson": "L11", "trad": "了", "pinyin": "le", "pos": "Ptc", "ja": "言葉の助詞。完了したアクションを示す", "ex_zh": "我昨天跟朋友說了很多話，我們都很開心。", "ex_py": "Wǒ zuótiān gēn péngyǒu shuō le hěn duō huà, wǒmen dōu hěn kāixīn.", "ex_ja": "昨日友達とたくさん話して、みんなとても楽しかったです。"}, {"lesson": "L11", "trad": "跟", "pinyin": "gēn", "pos": "Conj", "ja": "そして", "ex_zh": "我想跟你一起去看電影。", "ex_py": "Wǒ xiǎng gēn nǐ yīqǐ qù kàn diànyǐng.", "ex_ja": "あなたと一緒に映画を見に行きたいです。"}, {"lesson": "L11", "trad": "幫", "pinyin": "bāng", "pos": "V", "ja": "助けるために", "ex_zh": "可以請你幫我一個忙嗎？", "ex_py": "Kěyǐ qǐng nǐ bāng wǒ yī ge máng ma?", "ex_ja": "お願いがあるのですが、手伝っていただけますか？"}, {"lesson": "L11", "trad": "回答", "pinyin": "huídá", "pos": "V", "ja": "答えること。返信する", "ex_zh": "我不知道怎麼回答他的問題。", "ex_py": "Wǒ bù zhīdào zěnme huídá tā de wèntí.", "ex_ja": "彼の質問にどう答えればいいかわかりません。"},
  {"lesson": "L11", "trad": "什麼時候", "pinyin": "shénmeshíhòu", "pos": "Phrase", "ja": "いつ..？", "ex_zh": "A：你什麼時候有空？要不要跟我去唱歌？B：我今天下午有空。", "ex_py": "A: Nǐ shénme shíhòu yǒukòng? Yào bú yào gēn wǒ qù chànggē? B: Wǒ jīntiān xiàwǔ yǒukòng.", "ex_ja": "A：いつ暇ですか？一緒にカラオケに行きませんか？B：今日の午後は暇です。"}, {"lesson": "L12", "trad": "工作", "pinyin": "gōngzuò", "pos": "N/Vi", "ja": "仕事;働く", "ex_zh": "我爸爸是老師，他很喜歡他的工作。", "ex_py": "Wǒ bàba shì lǎoshī, tā hěn xǐhuān tā de gōngzuò.", "ex_ja": "父は教師で、自分の仕事がとても好きです。"}, {"lesson": "L12", "trad": "公司", "pinyin": "gōngsī", "pos": "N", "ja": "会社", "ex_zh": "我們公司附近有很多餐廳和飲料店。", "ex_py": "Wǒmen gōngsī fùjìn yǒu hěn duō cāntīng hé yǐnliào diàn.", "ex_ja": "私たちの会社の近くにたくさんのレストランや飲み物店があります。"}, {"lesson": "L12", "trad": "工人", "pinyin": "gōngrén", "pos": "N", "ja": "ワーカー", "ex_zh": "聽說這家工廠的工人都很辛苦，可是老闆給的錢不多。", "ex_py": "Tīngshuō zhè jiā gōngchǎng de gōngrén dōu hěn xīnkǔ, kěshì lǎobǎn gěi de qián bù duō.", "ex_ja": "この工場の工員はみんな大変だと聞いていますが、給料は多くないそうです。"}, {"lesson": "L12", "trad": "工廠", "pinyin": "gōngchǎng", "pos": "N", "ja": "工場", "ex_zh": "聽說這家工廠的工人都很辛苦，可是老闆給的錢不多。", "ex_py": "Tīngshuō zhè jiā gōngchǎng de gōngrén dōu hěn xīnkǔ, kěshì lǎobǎn gěi de qián bù duō.", "ex_ja": "この工場の工員はみんな大変だと聞いていますが、給料は多くないそうです。"},

  {"lesson": "L13", "trad": "世界", "pinyin": "shìjiè", "pos": "N", "ja": "世界", "ex_zh": "世界很大，沒去過的地方我都想去。", "ex_py": "Shìjiè hěn dà, méi qùguò de dìfāng wǒ dōu xiǎng qù.", "ex_ja": "世界は広くて、まだ行ったことのない場所には全部行ってみたいです。"}, {"lesson": "L13", "trad": "世界上", "pinyin": "shìjiè shàng", "pos": "Phrase", "ja": "世界で", "ex_zh": "你知道現在世界上有多少人嗎？", "ex_py": "Nǐ zhīdào xiànzài shìjiè shàng yǒu duōshǎo rén ma?", "ex_ja": "今世界に何人の人がいるか知っていますか？"}, {"lesson": "L13", "trad": "往", "pinyin": "wǎng", "pos": "Prep", "ja": "に向かって", "ex_zh": "你先往左轉，再往右轉，就到那家餐廳了。", "ex_py": "Nǐ xiān wǎng zuǒ zhuǎn, zài wǎng yòu zhuǎn, jiù dào nà jiā cāntīng le.", "ex_ja": "まず左に曲がって、次に右に曲がると、そのレストランに着きます。"}, {"lesson": "L13", "trad": "參觀", "pinyin": "cānguān", "pos": "V", "ja": "訪問する（インスタレーション、場所）", "ex_zh": "老闆今天帶我去參觀了一家工廠。", "ex_py": "Lǎobǎn jīntiān dài wǒ qù cānguān le yī jiā gōngchǎng.", "ex_ja": "上司が今日工場を見学させてくれました。"}, {"lesson": "L13", "trad": "進來", "pinyin": "jìnlái", "pos": "Vi", "ja": "入ってくる。入る", "ex_zh": "外面很冷，請進來吧！", "ex_py": "Wàimiàn hěn lěng, qǐng jìnlái ba!", "ex_ja": "外は寒いので、どうぞ中に入ってください！"},
  {"lesson": "L13", "trad": "轉", "pinyin": "zhuǎn", "pos": "V", "ja": "回す", "ex_zh": "你先往左轉，再往右轉，就到那家餐廳了。", "ex_py": "Nǐ xiān wǎng zuǒ zhuǎn, zài wǎng yòu zhuǎn, jiù dào nà jiā cāntīng le.", "ex_ja": "まず左に曲がって、次に右に曲がると、そのレストランに着きます。"}, {"lesson": "L13", "trad": "馬上", "pinyin": "mǎshàng", "pos": "Adv", "ja": "すぐに;すぐに", "ex_zh": "我問了他一個問題，他馬上就回答了。", "ex_py": "Wǒ wèn le tā yī ge wèntí, tā mǎshàng jiù huídá le.", "ex_ja": "彼に質問したら、すぐに答えてくれました。"}, {"lesson": "L13", "trad": "喂", "pinyin": "wèi", "pos": "Ptc", "ja": "こんにちは（電話で）", "ex_zh": "喂，請問王宜文小姐在嗎？", "ex_py": "Wèi, qǐngwèn Wáng Yíwén xiǎojiě zài ma?", "ex_ja": "もしもし、王宜文さんはいらっしゃいますか？"}, {"lesson": "L13", "trad": "真的", "pinyin": "zhēnde", "pos": "Adv", "ja": "本当に;本当に", "ex_zh": "A：他今天不來了。B：真的嗎？", "ex_py": "A: Tā jīntiān bù lái le. B: Zhēnde ma?", "ex_ja": "A：彼は今日来なくなりました。B：本当ですか？"}, {"lesson": "L13", "trad": "壞", "pinyin": "huài", "pos": "Vs/Vp", "ja": "悪い/壊れた;故障中", "ex_zh": "我的舊電腦壞了，我打算買一部新的。", "ex_py": "Wǒ de jiù diànnǎo huài le, wǒ dǎsuàn mǎi yī bù xīn de.", "ex_ja": "古いパソコンが壊れたので、新しいものを買おうと思っています。"},

// 課ごとの単語数を集計
const lessonCounts = {};
VOCAB.forEach(v => {
  lessonCounts[v.lesson] = (lessonCounts[v.lesson] || 0) + 1;
});

const lessons = Object.keys(lessonCounts).sort();
const selectedLessons = new Set();

// 課選択ボタン生成
const grid = document.getElementById('lesson-grid');
lessons.forEach(lesson => {
  const btn = document.createElement('button');
  btn.className = 'lesson-btn';
  const label = lesson === 'L00' ? '基礎' : lesson.replace('L', '第') + '課';
  btn.innerHTML = `${label}<span class="count">${lessonCounts[lesson]}語</span>`;
  btn.onclick = () => selectLesson(lesson);
  btn.dataset.lesson = lesson;
  grid.appendChild(btn);
});

function selectLesson(lesson) {
  selectedLessons.clear();
  selectedLessons.add(lesson);
  startStudy(false);
}

// ===== 学習ロジック =====
let cards = [], currentIndex = 0, isFlipped = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startStudy() {
  cards = shuffle(VOCAB.filter(v => selectedLessons.has(v.lesson)));
  currentIndex = 0;
  showScreen('screen-card');
  showCard();
}

function showCard() {
  const card = cards[currentIndex];
  isFlipped = false;
  const cardInner = document.getElementById('card-inner');
  cardInner.style.transition = 'none';
  cardInner.classList.remove('flipped');
  cardInner.offsetHeight; // reflow で即時反映
  cardInner.style.transition = '';
  document.getElementById('flip-hint').textContent = 'タップして答えを見る';
  document.getElementById('flip-hint').style.display = '';

  const total = cards.length;
  const done = currentIndex;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;

  const lessonLabel = card.lesson === 'L00' ? '基礎' : card.lesson.replace('L', '第') + '課';
  document.getElementById('card-lesson').textContent = lessonLabel;
  document.getElementById('card-chinese').textContent = card.trad;
  document.getElementById('card-pos-back').textContent = card.pos;
  document.getElementById('card-lesson-back').textContent = lessonLabel;
  document.getElementById('card-chinese-back').textContent = card.trad;
  document.getElementById('card-pinyin').textContent = card.pinyin;
  document.getElementById('card-ja').textContent = card.ja;
  const exEl = document.getElementById('card-example');
  if (card.ex_zh) {
    exEl.innerHTML =
      `<div class="ex-zh">${card.ex_zh}</div>` +
      `<div class="ex-py">${card.ex_py}</div>` +
      `<div class="ex-ja">${card.ex_ja}</div>`;
    exEl.style.display = 'block';
  } else {
    exEl.innerHTML = '';
    exEl.style.display = 'none';
  }
  const container = document.querySelector('.card-container');
  container.style.height = card.ex_zh ? '440px' : '300px';
  speak();
}

function flipCard() {
  if (!isFlipped) {
    isFlipped = true;
    document.getElementById('card-inner').classList.add('flipped');
    document.getElementById('flip-hint').textContent = 'タップして次へ';
  } else {
    currentIndex++;
    if (currentIndex >= cards.length) {
      showScreen('screen-result');
    } else {
      showCard();
    }
  }
}

function speak() {
  const text = cards[currentIndex].trad;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function retryAll() { startStudy(); }
function goSelect() { showScreen('screen-select'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
