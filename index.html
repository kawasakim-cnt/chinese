<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>時代華語① フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #2d3748;
  }

  /* ===== ヘッダー ===== */
  .header {
    background: #2b6cb0;
    color: white;
    padding: 16px 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* ===== 画面切り替え ===== */
  .screen { display: none; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===== 課選択画面 ===== */
  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .lesson-btn {
    padding: 14px 0;
    border: 2px solid #bee3f8;
    border-radius: 10px;
    background: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #2b6cb0;
  }
  .lesson-btn.selected {
    background: #2b6cb0;
    color: white;
    border-color: #2b6cb0;
  }
  .lesson-btn .count {
    display: block;
    font-size: 11px;
    font-weight: normal;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* ===== フラッシュカード画面 ===== */
  .progress-bar-wrap {
    background: #e2e8f0;
    border-radius: 999px;
    height: 8px;
    margin-bottom: 8px;
  }
  .progress-bar {
    background: #2b6cb0;
    height: 8px;
    border-radius: 999px;
    transition: width 0.3s;
  }
  .progress-text {
    text-align: center;
    font-size: 13px;
    color: #718096;
    margin-bottom: 20px;
  }
  .card-container {
    perspective: 1000px;
    height: 300px;
    margin-bottom: 24px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-front {
    background: white;
  }
  .card-back {
    background: #ebf8ff;
    transform: rotateY(180deg);
  }
  .card-lesson-badge {
    position: absolute;
    top: 14px;
    right: 16px;
    background: #bee3f8;
    color: #2b6cb0;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .card-pos {
    position: absolute;
    top: 14px;
    left: 16px;
    color: #a0aec0;
    font-size: 12px;
  }
  .card-pos-badge {
    margin-top: 14px;
    background: #e9d8fd;
    color: #6b46c1;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 14px;
    border-radius: 999px;
  }
  .card-chinese {
    font-size: 72px;
    font-weight: bold;
    color: #1a202c;
    line-height: 1.1;
    text-align: center;
  }
  .card-hint {
    margin-top: 16px;
    color: #a0aec0;
    font-size: 14px;
  }
  .card-pinyin {
    font-size: 26px;
    color: #2b6cb0;
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .card-ja {
    font-size: 22px;
    color: #2d3748;
    text-align: center;
    line-height: 1.5;
  }
  .card-example {
    margin-top: 10px;
    padding: 8px 10px 0;
    border-top: 1px solid #e2e8f0;
    text-align: left;
    line-height: 1.6;
    width: 100%;
  }
  .ex-zh {
    font-size: 18px;
    color: #2d3748;
  }
  .ex-py {
    font-size: 15px;
    color: #718096;
  }
  .ex-ja {
    font-size: 15px;
    color: #718096;
  }

  /* ===== 音声ボタン ===== */
  .btn-speak {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    padding: 4px 12px;
  }
  .btn-speak:active { opacity: 1; }

  /* ===== ボタン群 ===== */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn-wrong {
    flex: 1;
    padding: 16px;
    background: white;
    border: 2px solid #fc8181;
    color: #e53e3e;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-wrong:hover { background: #fff5f5; }
  .btn-correct {
    flex: 1;
    padding: 16px;
    background: #2b6cb0;
    border: 2px solid #2b6cb0;
    color: white;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-correct:hover { background: #2c5282; }
  .flip-hint {
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
  }
  .action-buttons.hidden { opacity: 0; pointer-events: none; }

  /* ===== 結果画面 ===== */
  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #2b6cb0;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 24px auto;
    font-size: 14px;
  }
  .result-circle .score {
    font-size: 42px;
    font-weight: bold;
    line-height: 1;
  }
  .result-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-box {
    flex: 1;
    background: white;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-box .stat-num {
    font-size: 32px;
    font-weight: bold;
  }
  .stat-box .stat-label { font-size: 13px; color: #718096; margin-top: 4px; }
  .stat-box.correct .stat-num { color: #2b6cb0; }
  .stat-box.wrong .stat-num { color: #e53e3e; }
  .result-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-retry {
    width: 100%;
    padding: 16px;
    background: #2b6cb0;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-retry-wrong {
    width: 100%;
    padding: 16px;
    background: white;
    color: #e53e3e;
    border: 2px solid #fc8181;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-back {
    width: 100%;
    padding: 14px;
    background: white;
    color: #718096;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }
  .result-title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">時代華語① フラッシュカード</div>

<!-- 課選択画面 -->
<div id="screen-select" class="screen active">
  <div class="lesson-grid" id="lesson-grid"></div>
</div>

<!-- フラッシュカード画面 -->
<div id="screen-card" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>

  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <span class="card-lesson-badge" id="card-lesson"></span>
        <div class="card-chinese" id="card-chinese"></div>
        <div class="card-hint">タップして答えを見る</div>
        <button class="btn-speak" onclick="event.stopPropagation(); speak()">🔊</button>
      </div>
      <div class="card-face card-back">
        <span class="card-lesson-badge" id="card-lesson-back"></span>
        <div class="card-chinese" style="font-size:52px; margin-bottom:8px;" id="card-chinese-back"></div>
        <div class="card-pinyin" id="card-pinyin"></div>
        <div class="card-ja" id="card-ja"></div>
        <div class="card-example" id="card-example"></div>
        <div class="card-pos-badge" id="card-pos-back"></div>
        <button class="btn-speak" onclick="event.stopPropagation(); speak()">🔊</button>
      </div>
    </div>
  </div>

  <div class="flip-hint" id="flip-hint">タップして答えを見る</div>
  <button class="btn-back" style="margin-top:16px; width:100%;" onclick="goSelect()">← メニューに戻る</button>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen">
  <div class="result-title">お疲れ様でした！</div>
  <div class="result-buttons">
    <button class="btn-retry" onclick="retryAll()">もう一度</button>
    <button class="btn-back" style="margin-top:12px;" onclick="goSelect()">← 課選択に戻る</button>
  </div>
</div>

  {"lesson": "L16", "trad": "中部", "pinyin": "zhōngbù", "pos": "N", "ja": "中央部"}, {"lesson": "L16", "trad": "東", "pinyin": "dōng", "pos": "N", "ja": "東"}, {"lesson": "L16", "trad": "西", "pinyin": "xī", "pos": "N", "ja": "西"}, {"lesson": "L16", "trad": "南", "pinyin": "nán", "pos": "N", "ja": "南"}, {"lesson": "L16", "trad": "北", "pinyin": "běi", "pos": "N", "ja": "北"},

// 課ごとの単語数を集計
const lessonCounts = {};
VOCAB.forEach(v => {
  lessonCounts[v.lesson] = (lessonCounts[v.lesson] || 0) + 1;
});

const lessons = Object.keys(lessonCounts).sort();
const selectedLessons = new Set();

// 課選択ボタン生成
const grid = document.getElementById('lesson-grid');
lessons.forEach(lesson => {
  const btn = document.createElement('button');
  btn.className = 'lesson-btn';
  const label = lesson === 'L00' ? '基礎' : lesson.replace('L', '第') + '課';
  btn.innerHTML = `${label}<span class="count">${lessonCounts[lesson]}語</span>`;
  btn.onclick = () => selectLesson(lesson);
  btn.dataset.lesson = lesson;
  grid.appendChild(btn);
});

function selectLesson(lesson) {
  selectedLessons.clear();
  selectedLessons.add(lesson);
  startStudy(false);
}

// ===== 学習ロジック =====
let cards = [], currentIndex = 0, isFlipped = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startStudy() {
  cards = shuffle(VOCAB.filter(v => selectedLessons.has(v.lesson)));
  currentIndex = 0;
  showScreen('screen-card');
  showCard();
}

function showCard() {
  const card = cards[currentIndex];
  isFlipped = false;
  const cardInner = document.getElementById('card-inner');
  cardInner.style.transition = 'none';
  cardInner.classList.remove('flipped');
  cardInner.offsetHeight; // reflow で即時反映
  cardInner.style.transition = '';
  document.getElementById('flip-hint').textContent = 'タップして答えを見る';
  document.getElementById('flip-hint').style.display = '';

  const total = cards.length;
  const done = currentIndex;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;

  const lessonLabel = card.lesson === 'L00' ? '基礎' : card.lesson.replace('L', '第') + '課';
  document.getElementById('card-lesson').textContent = lessonLabel;
  document.getElementById('card-chinese').textContent = card.trad;
  document.getElementById('card-pos-back').textContent = card.pos;
  document.getElementById('card-lesson-back').textContent = lessonLabel;
  document.getElementById('card-chinese-back').textContent = card.trad;
  document.getElementById('card-pinyin').textContent = card.pinyin;
  document.getElementById('card-ja').textContent = card.ja;
  const exEl = document.getElementById('card-example');
  if (card.ex_zh) {
    exEl.innerHTML =
      `<div class="ex-zh">${card.ex_zh}</div>` +
      `<div class="ex-py">${card.ex_py}</div>` +
      `<div class="ex-ja">${card.ex_ja}</div>`;
    exEl.style.display = 'block';
  } else {
    exEl.innerHTML = '';
    exEl.style.display = 'none';
  }
  const container = document.querySelector('.card-container');
  container.style.height = card.ex_zh ? '440px' : '300px';
  speak();
}

function flipCard() {
  if (!isFlipped) {
    isFlipped = true;
    document.getElementById('card-inner').classList.add('flipped');
    document.getElementById('flip-hint').textContent = 'タップして次へ';
  } else {
    currentIndex++;
    if (currentIndex >= cards.length) {
      showScreen('screen-result');
    } else {
      showCard();
    }
  }
}

function speak() {
  const text = cards[currentIndex].trad;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function retryAll() { startStudy(); }
function goSelect() { showScreen('screen-select'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
