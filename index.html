<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>時代華語① フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #2d3748;
  }

  /* ===== ヘッダー ===== */
  .header {
    background: #2b6cb0;
    color: white;
    padding: 16px 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* ===== 画面切り替え ===== */
  .screen { display: none; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===== 課選択画面 ===== */
  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .lesson-btn {
    padding: 14px 0;
    border: 2px solid #bee3f8;
    border-radius: 10px;
    background: white;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #2b6cb0;
  }
  .lesson-btn.selected {
    background: #2b6cb0;
    color: white;
    border-color: #2b6cb0;
  }
  .lesson-btn .count {
    display: block;
    font-size: 11px;
    font-weight: normal;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* ===== フラッシュカード画面 ===== */
  .progress-bar-wrap {
    background: #e2e8f0;
    border-radius: 999px;
    height: 8px;
    margin-bottom: 8px;
  }
  .progress-bar {
    background: #2b6cb0;
    height: 8px;
    border-radius: 999px;
    transition: width 0.3s;
  }
  .progress-text {
    text-align: center;
    font-size: 13px;
    color: #718096;
    margin-bottom: 20px;
  }
  .card-container {
    perspective: 1000px;
    height: 300px;
    margin-bottom: 24px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-front {
    background: white;
  }
  .card-back {
    background: #ebf8ff;
    transform: rotateY(180deg);
  }
  .card-lesson-badge {
    position: absolute;
    top: 14px;
    right: 16px;
    background: #bee3f8;
    color: #2b6cb0;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .card-pos {
    position: absolute;
    top: 14px;
    left: 16px;
    color: #a0aec0;
    font-size: 12px;
  }
  .card-pos-badge {
    margin-top: 14px;
    background: #e9d8fd;
    color: #6b46c1;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 14px;
    border-radius: 999px;
  }
  .card-chinese {
    font-size: 72px;
    font-weight: bold;
    color: #1a202c;
    line-height: 1.1;
    text-align: center;
  }
  .card-hint {
    margin-top: 16px;
    color: #a0aec0;
    font-size: 14px;
  }
  .card-pinyin {
    font-size: 26px;
    color: #2b6cb0;
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .card-ja {
    font-size: 22px;
    color: #2d3748;
    text-align: center;
    line-height: 1.5;
  }
  .card-example {
    margin-top: 10px;
    padding: 8px 0 0;
    margin-left: -12px;
    margin-right: -12px;
    border-top: 1px solid #e2e8f0;
    text-align: left;
    line-height: 1.6;
    width: 100%;
  }
  .ex-zh {
    font-size: 24px;
    color: #2d3748;
  }
  .ex-py {
    font-size: 21px;
    color: #718096;
  }
  .ex-ja {
    font-size: 21px;
    color: #718096;
  }

  /* ===== 音声ボタン ===== */
  .btn-speak {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    padding: 4px 12px;
  }
  .btn-speak:active { opacity: 1; }

  /* ===== ボタン群 ===== */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn-wrong {
    flex: 1;
    padding: 16px;
    background: white;
    border: 2px solid #fc8181;
    color: #e53e3e;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-wrong:hover { background: #fff5f5; }
  .btn-correct {
    flex: 1;
    padding: 16px;
    background: #2b6cb0;
    border: 2px solid #2b6cb0;
    color: white;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-correct:hover { background: #2c5282; }
  .flip-hint {
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
  }
  .action-buttons.hidden { opacity: 0; pointer-events: none; }

  /* ===== 結果画面 ===== */
  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #2b6cb0;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 24px auto;
    font-size: 14px;
  }
  .result-circle .score {
    font-size: 42px;
    font-weight: bold;
    line-height: 1;
  }
  .result-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-box {
    flex: 1;
    background: white;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-box .stat-num {
    font-size: 32px;
    font-weight: bold;
  }
  .stat-box .stat-label { font-size: 13px; color: #718096; margin-top: 4px; }
  .stat-box.correct .stat-num { color: #2b6cb0; }
  .stat-box.wrong .stat-num { color: #e53e3e; }
  .result-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-retry {
    width: 100%;
    padding: 16px;
    background: #2b6cb0;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-retry-wrong {
    width: 100%;
    padding: 16px;
    background: white;
    color: #e53e3e;
    border: 2px solid #fc8181;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-back {
    width: 100%;
    padding: 14px;
    background: white;
    color: #718096;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }
  .result-title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">時代華語① フラッシュカード</div>

<!-- 課選択画面 -->
<div id="screen-select" class="screen active">
  <div class="lesson-grid" id="lesson-grid"></div>
</div>

<!-- フラッシュカード画面 -->
<div id="screen-card" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>

  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <span class="card-lesson-badge" id="card-lesson"></span>
        <div class="card-chinese" id="card-chinese"></div>
        <div class="card-hint">タップして答えを見る</div>
        <button class="btn-speak" onclick="event.stopPropagation(); speak()">🔊</button>
      </div>
      <div class="card-face card-back">
        <span class="card-lesson-badge" id="card-lesson-back"></span>
        <div class="card-chinese" style="font-size:52px; margin-bottom:8px;" id="card-chinese-back"></div>
        <div class="card-pinyin" id="card-pinyin"></div>
        <div class="card-ja" id="card-ja"></div>
        <div class="card-example" id="card-example"></div>
        <div class="card-pos-badge" id="card-pos-back"></div>
        <button class="btn-speak" onclick="event.stopPropagation(); speakExample()">🔊</button>
      </div>
    </div>
  </div>

  <div class="flip-hint" id="flip-hint">タップして答えを見る</div>
  <button class="btn-back" style="margin-top:16px; width:100%;" onclick="goSelect()">← メニューに戻る</button>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen">
  <div class="result-title">お疲れ様でした！</div>
  <div class="result-buttons">
    <button class="btn-retry" onclick="retryAll()">もう一度</button>
    <button class="btn-back" style="margin-top:12px;" onclick="goSelect()">← 課選択に戻る</button>
  </div>
</div>

  {"lesson": "L06", "trad": "平常", "pinyin": "píngcháng", "pos": "Adv", "ja": "普段;いつも", "ex_zh": "平常我們都有點兒忙，可是週末我們常一起去運動。", "ex_py": "Píngcháng wǒmen dōu yǒudiǎnr máng, kěshì zhōumò wǒmen cháng yīqǐ qù yùndòng.", "ex_ja": "普段は少し忙しいですが、週末はよく一緒に運動しに行きます。"}, {"lesson": "L06", "trad": "高興", "pinyin": "gāoxìng", "pos": "Vs", "ja": "嬉しい", "ex_zh": "有這幾個好朋友，我真高興！", "ex_py": "Yǒu zhè jǐ ge hǎo péngyǒu, wǒ zhēn gāoxìng!", "ex_ja": "こんなに良い友達がいて、本当に嬉しいです！"}, {"lesson": "L06", "trad": "有趣", "pinyin": "yǒuqù", "pos": "Vs", "ja": "面白い", "ex_zh": "王老師的課很有趣，每個學生都喜歡她。", "ex_py": "Wáng lǎoshī de kè hěn yǒuqù, měi ge xuéshēng dōu xǐhuān tā.", "ex_ja": "王先生の授業はとても面白く、全ての学生が彼女を好きです。"}, {"lesson": "L08", "trad": "有空", "pinyin": "yǒukòng", "pos": "Vs", "ja": "無料;暇なとき。利用可能", "ex_zh": "明天我有空，我想去買皮包。", "ex_py": "Míngtiān wǒ yǒukòng, wǒ xiǎng qù mǎi píbāo.", "ex_ja": "明日は暇があるので、バッグを買いに行きたいです。"}, {"lesson": "L06", "trad": "打", "pinyin": "dǎ", "pos": "V", "ja": "打つ;（球技を）する", "ex_zh": "我跟同學常常一起在學校打網球。", "ex_py": "Wǒ gēn tóngxué chángcháng yīqǐ zài xuéxiào dǎ wǎngqiú.", "ex_ja": "クラスメートとよく学校でテニスをします。"},
  {"lesson": "L06", "trad": "踢", "pinyin": "tī", "pos": "V", "ja": "蹴る", "ex_zh": "那個孩子很愛踢足球。", "ex_py": "Nà ge háizi hěn ài tī zúqiú.", "ex_ja": "その子はサッカーがとても好きです。"}, {"lesson": "L06", "trad": "快", "pinyin": "kuài", "pos": "Vs", "ja": "速い", "ex_zh": "她看書看得很快。", "ex_py": "Tā kànshū kàn de hěn kuài.", "ex_ja": "彼女は本を読むのがとても速いです。"}, {"lesson": "L06", "trad": "幾", "pinyin": "jǐ", "pos": "N", "ja": "いくつの;何人かの", "ex_zh": "我有幾個好朋友，我們都喜歡學中文。", "ex_py": "Wǒ yǒu jǐ ge hǎo péngyǒu, wǒmen dōu xǐhuān xué Zhōngwén.", "ex_ja": "何人かの友達がいて、みんな中国語を学ぶのが好きです。"}, {"lesson": "L06", "trad": "風景", "pinyin": "fēngjǐng", "pos": "N", "ja": "景色;風景", "ex_zh": "你喜歡山上的風景還是海邊的風景？", "ex_py": "Nǐ xǐhuān shānshàng de fēngjǐng háishi hǎibiān de fēngjǐng?", "ex_ja": "山の景色と海の景色どちらが好きですか？"}, {"lesson": "L06", "trad": "歌", "pinyin": "gē", "pos": "N", "ja": "歌", "ex_zh": "中明最愛唱歌，他的中文歌唱得很好。", "ex_py": "Zhōngmíng zuì ài chànggē, tā de Zhōngwén gē chàng de hěn hǎo.", "ex_ja": "中明は歌うことが一番好きで、中国語の歌がとても上手です。"},

  {"lesson": "L07", "trad": "飛機場", "pinyin": "fēijīchǎng", "pos": "N", "ja": "空港", "ex_zh": "我明天早上九點要到機場。", "ex_py": "Wǒ míngtiān zǎoshàng jiǔ diǎn yào dào jīchǎng.", "ex_ja": "明日の朝9時に空港に到着する必要があります。"}, {"lesson": "L07", "trad": "機場", "pinyin": "jīchǎng", "pos": "N", "ja": "空港", "ex_zh": "我明天早上九點要到機場。", "ex_py": "Wǒ míngtiān zǎoshàng jiǔ diǎn yào dào jīchǎng.", "ex_ja": "明日の朝9時に空港に到着する必要があります。"}, {"lesson": "L07", "trad": "計程車", "pinyin": "jìchéngchē", "pos": "N", "ja": "タクシー", "ex_zh": "他坐計程車到學校去。", "ex_py": "Tā zuò jìchéngchē dào xuéxiào qù.", "ex_ja": "彼はタクシーで学校に行きます。"}, {"lesson": "L07", "trad": "捷運", "pinyin": "jiéyùn", "pos": "N", "ja": "MRT;地下鉄", "ex_zh": "你想坐捷運去，還是坐公車去？", "ex_py": "Nǐ xiǎng zuò jiéyùn qù, háishi zuò gōngchē qù?", "ex_ja": "MRTで行きますか、バスで行きますか？"}, {"lesson": "L07", "trad": "地鐵", "pinyin": "dìtiě", "pos": "N", "ja": "MRT;地下鉄", "ex_zh": "你想坐捷運去，還是坐公車去？", "ex_py": "Nǐ xiǎng zuò jiéyùn qù, háishi zuò gōngchē qù?", "ex_ja": "MRTで行きますか、バスで行きますか？"},

  {"lesson": "L07", "trad": "道", "pinyin": "dào", "pos": "M", "ja": "料理を表す量詞", "ex_zh": "今天的晚飯有三道菜。", "ex_py": "Jīntiān de wǎnfàn yǒu sān dào cài.", "ex_ja": "今夜の夕食は三品あります。"}, {"lesson": "L07", "trad": "架", "pinyin": "jià", "pos": "M", "ja": "飛行機の量詞", "ex_zh": "今天有三架飛機從台北飛到東京。", "ex_py": "Jīntiān yǒu sān jià fēijī cóng Táiběi fēi dào Dōngjīng.", "ex_ja": "今日3機の飛行機が台北から東京に飛びます。"}, {"lesson": "L07", "trad": "封", "pinyin": "fēng", "pos": "M", "ja": "手紙を数える量詞", "ex_zh": "我要到郵局去寄信，也要買一些信封。", "ex_py": "Wǒ yào dào yóujú qù jì xìn, yě yào mǎi yīxiē xìnfēng.", "ex_ja": "郵便局に手紙を出しに行って、封筒も買います。"}, {"lesson": "L07", "trad": "信", "pinyin": "xìn", "pos": "N", "ja": "手紙", "ex_zh": "我要到郵局去寄信，也要買一些信封。", "ex_py": "Wǒ yào dào yóujú qù jì xìn, yě yào mǎi yīxiē xìnfēng.", "ex_ja": "郵便局に手紙を出しに行って、封筒も買います。"}, {"lesson": "L07", "trad": "信封", "pinyin": "xìnfēng", "pos": "N", "ja": "封筒", "ex_zh": "我要到郵局去寄信，也要買一些信封。", "ex_py": "Wǒ yào dào yóujú qù jì xìn, yě yào mǎi yīxiē xìnfēng.", "ex_ja": "郵便局に手紙を出しに行って、封筒も買います。"},
  {"lesson": "L07", "trad": "韓國", "pinyin": "Hánguó", "pos": "N", "ja": "韓国", "ex_zh": "他今天從韓國到台灣來看朋友。", "ex_py": "Tā jīntiān cóng Hánguó dào Táiwān lái kàn péngyǒu.", "ex_ja": "彼は今日韓国から台湾に友達に会いに来ました。"}, {"lesson": "L07", "trad": "菲律賓", "pinyin": "Fēilǜbīn", "pos": "N", "ja": "フィリピン", "ex_zh": "她是菲律賓人，她說中文說得很好。", "ex_py": "Tā shì Fēilǜbīn rén, tā shuō Zhōngwén shuō de hěn hǎo.", "ex_ja": "彼女はフィリピン人で、中国語がとても上手です。"}, {"lesson": "L07", "trad": "找", "pinyin": "zhǎo", "pos": "V", "ja": "（友人を）訪問する/会う", "ex_zh": "我今天想找朋友去吃飯。", "ex_py": "Wǒ jīntiān xiǎng zhǎo péngyǒu qù chīfàn.", "ex_ja": "今日友達を訪ねて食事に行きたいです。"}, {"lesson": "L08", "trad": "這", "pinyin": "zhè/zhèi", "pos": "Det", "ja": "この;これ", "ex_zh": "這件衣服多少錢？", "ex_py": "Zhè jiàn yīfu duōshǎo qián?", "ex_ja": "この服はいくらですか？"}, {"lesson": "L08", "trad": "長", "pinyin": "cháng", "pos": "Vs", "ja": "長い", "ex_zh": "弟弟愛穿短褲，不愛穿長褲。", "ex_py": "Dìdi ài chuān duǎn kù, bú ài chuān cháng kù.", "ex_ja": "弟はショートパンツが好きで、長ズボンが嫌いです。"},

  {"lesson": "L10", "trad": "口罩", "pinyin": "kǒuzhào", "pos": "N", "ja": "サージカルマスク", "ex_zh": "最近很多人感冒，你要戴口罩、常洗手。", "ex_py": "Zuìjìn hěn duō rén gǎnmào, nǐ yào dài kǒuzhào, cháng xǐ shǒu.", "ex_ja": "最近風邪をひく人が多いので、マスクをつけてよく手を洗いましょう。"}, {"lesson": "L10", "trad": "藥", "pinyin": "yào", "pos": "N", "ja": "薬", "ex_zh": "醫生說，我應該多喝水，不需要吃藥。", "ex_py": "Yīshēng shuō, wǒ yīnggāi duō hē shuǐ, bù xūyào chī yào.", "ex_ja": "先生は水をたくさん飲むべきで、薬を飲む必要はないと言いました。"}, {"lesson": "L10", "trad": "痛", "pinyin": "tòng", "pos": "Vs", "ja": "痛い", "ex_zh": "我感冒了，頭很痛，眼睛、耳朵也不舒服。", "ex_py": "Wǒ gǎnmào le, tóu hěn tòng, yǎnjīng, ěrduo yě bù shūfu.", "ex_ja": "風邪をひいて、頭が痛くて、目と耳も不快です。"}, {"lesson": "L10", "trad": "乾淨", "pinyin": "gānjìng", "pos": "Vs", "ja": "クリーン", "ex_zh": "這張椅子不太乾淨，我要那張。", "ex_py": "Zhè zhāng yǐzi bú tài gānjìng, wǒ yào nà zhāng.", "ex_ja": "この椅子はあまりきれいではないので、あちらのをお願いします。"}, {"lesson": "L10", "trad": "好了", "pinyin": "hǎo le", "pos": "Phrase", "ja": "良くなる", "ex_zh": "A：聽說你弟弟生病了，他現在怎麼樣？B：他好了，明天可以去學校了。", "ex_py": "A: Tīngshuō nǐ dìdi shēngbìng le, tā xiànzài zěnmeyàng? B: Tā hǎo le, míngtiān kěyǐ qù xuéxiào le.", "ex_ja": "A：あなたの弟が病気だと聞きましたが、今どうですか？B：よくなって、明日学校に行けます。"},

  {"lesson": "L10", "trad": "忘記", "pinyin": "wàngjì", "pos": "Vpt", "ja": "忘れる", "ex_zh": "媽媽告訴我，不要忘記去超級市場買飲料。", "ex_py": "Māma gàosù wǒ, bú yào wàngjì qù chāojí shìchǎng mǎi yǐnliào.", "ex_ja": "お母さんはスーパーに飲み物を買いに行くのを忘れないよう言いました。"}, {"lesson": "L10", "trad": "洗", "pinyin": "xǐ", "pos": "V", "ja": "洗う", "ex_zh": "最近很多人感冒，你要戴口罩、常洗手。", "ex_py": "Zuìjìn hěn duō rén gǎnmào, nǐ yào dài kǒuzhào, cháng xǐ shǒu.", "ex_ja": "最近風邪をひく人が多いので、マスクをつけてよく手を洗いましょう。"}, {"lesson": "L10", "trad": "記得", "pinyin": "jìde", "pos": "Vst", "ja": "思い出す", "ex_zh": "我只記得明天有考試，不記得有功課。", "ex_py": "Wǒ zhǐ jìde míngtiān yǒu kǎoshì, bù jìde yǒu gōngkè.", "ex_ja": "明日試験があることだけ覚えていて、宿題があることは覚えていません。"}, {"lesson": "L10", "trad": "請假", "pinyin": "qǐngjià", "pos": "V-sep", "ja": "葉っぱを求める", "ex_zh": "弟弟發燒了，他要請假。", "ex_py": "Dìdi fāshāo le, tā yào qǐngjià.", "ex_ja": "弟が熱を出したので、休みを取ります。"}, {"lesson": "L10", "trad": "多", "pinyin": "duō", "pos": "Adv", "ja": "もっとやるために", "ex_zh": "我最近太胖了，應該多運動，少吃一點飯。", "ex_py": "Wǒ zuìjìn tài pàng le, yīnggāi duō yùndòng, shǎo chī yīdiǎn fàn.", "ex_ja": "最近太り過ぎたので、もっと運動して、少し食事を減らすべきです。"},
  {"lesson": "L10", "trad": "少", "pinyin": "shǎo", "pos": "Adv", "ja": "やることを減らす", "ex_zh": "我最近太胖了，應該多運動，少吃一點飯。", "ex_py": "Wǒ zuìjìn tài pàng le, yīnggāi duō yùndòng, shǎo chī yīdiǎn fàn.", "ex_ja": "最近太り過ぎたので、もっと運動して、少し食事を減らすべきです。"}, {"lesson": "L10", "trad": "能", "pinyin": "néng", "pos": "Vaux", "ja": "できる;できるように", "ex_zh": "你能幫我嗎？", "ex_py": "Nǐ néng bāng wǒ ma?", "ex_ja": "手伝ってもらえますか？"}, {"lesson": "L10", "trad": "會", "pinyin": "huì", "pos": "Vaux", "ja": "意思; +Vに行く予定です", "ex_zh": "他明天沒有空，不會來我們家。", "ex_py": "Tā míngtiān méiyǒu kòng, bú huì lái wǒmen jiā.", "ex_ja": "彼は明日暇がないので、私たちの家に来ません。"}, {"lesson": "L10", "trad": "需要", "pinyin": "xūyào", "pos": "Vst", "ja": "必要とする", "ex_zh": "每個人都需要朋友。", "ex_py": "Měi gè rén dōu xūyào péngyǒu.", "ex_ja": "誰でも友達が必要です。"}, {"lesson": "L10", "trad": "如果", "pinyin": "rúguǒ", "pos": "Conj", "ja": "もし", "ex_zh": "如果明天天氣好，我就去打球。", "ex_py": "Rúguǒ míngtiān tiānqì hǎo, wǒ jiù qù dǎqiú.", "ex_ja": "明日天気が良ければ、ボール遊びに行きます。"},
  {"lesson": "L10", "trad": "蘋果", "pinyin": "píngguǒ", "pos": "N", "ja": "リンゴ", "ex_zh": "我最愛吃蘋果跟香蕉。", "ex_py": "Wǒ zuì ài chī píngguǒ gēn xiāngjiāo.", "ex_ja": "私はりんごとバナナが最も好きです。"}, {"lesson": "L10", "trad": "受傷", "pinyin": "shòushāng", "pos": "Vp-sep", "ja": "怪我をする。傷つく", "ex_zh": "他踢足球的時候受傷了。", "ex_py": "Tā tī zúqiú de shíhòu shòushāng le.", "ex_ja": "彼はサッカーをしていて怪我をしました。"}, {"lesson": "L11", "trad": "聊天(兒)", "pinyin": "liáotiān(r)", "pos": "V-sep", "ja": "チャットする", "ex_zh": "他說話很有趣，所以每個人都喜歡跟他聊天。", "ex_py": "Tā shuōhuà hěn yǒuqù, suǒyǐ měi gè rén dōu xǐhuān gēn tā liáotiān.", "ex_ja": "彼は話が面白いので、みんな彼とおしゃべりするのが好きです。"}, {"lesson": "L11", "trad": "聊", "pinyin": "liáo", "pos": "V", "ja": "チャットする", "ex_zh": "他說話很有趣，所以每個人都喜歡跟他聊天。", "ex_py": "Tā shuōhuà hěn yǒuqù, suǒyǐ měi gè rén dōu xǐhuān gēn tā liáotiān.", "ex_ja": "彼は話が面白いので、みんな彼とおしゃべりするのが好きです。"}, {"lesson": "L11", "trad": "網路", "pinyin": "wǎnglù", "pos": "N", "ja": "インターネット", "ex_zh": "我家的網路不好，網頁打開很慢。", "ex_py": "Wǒ jiā de wǎnglù bù hǎo, wǎngyè dǎkāi hěn màn.", "ex_ja": "うちのインターネット回線が遅くて、ページが開くのに時間がかかります。"},
  {"lesson": "L11", "trad": "網站", "pinyin": "wǎngzhàn", "pos": "N", "ja": "Webサイト", "ex_zh": "這個網站有很多有用的資訊。", "ex_py": "Zhège wǎngzhàn yǒu hěn duō yǒuyòng de zīxùn.", "ex_ja": "このWebサイトにはたくさん役立つ情報があります。"}, {"lesson": "L11", "trad": "網址", "pinyin": "wǎngzhǐ", "pos": "N", "ja": "ウェブアドレス。リンク", "ex_zh": "你可以告訴我那個網站的網址嗎？", "ex_py": "Nǐ kěyǐ gàosù wǒ nà ge wǎngzhàn de wǎngzhǐ ma?", "ex_ja": "そのWebサイトのURLを教えてもらえますか？"}, {"lesson": "L11", "trad": "留言", "pinyin": "liúyán", "pos": "Vi", "ja": "メッセージを残す", "ex_zh": "如果他不能接電話，你就留言吧！", "ex_py": "Rúguǒ tā bù néng jiē diànhuà, nǐ jiù liúyán ba!", "ex_ja": "もし彼が電話に出られなければ、メッセージを残してください！"}, {"lesson": "L11", "trad": "相片", "pinyin": "xiàngpiàn", "pos": "N", "ja": "写真", "ex_zh": "我想把這張相片放到網路上。", "ex_py": "Wǒ xiǎng bǎ zhè zhāng xiàngpiàn fàng dào wǎnglù shàng.", "ex_ja": "この写真をインターネットに載せたいです。"}, {"lesson": "L11", "trad": "照片", "pinyin": "zhàopiàn", "pos": "N", "ja": "写真", "ex_zh": "我去旅行的時候，拍了很多照片。", "ex_py": "Wǒ qù lǚxíng de shíhòu, pāi le hěn duō zhàopiàn.", "ex_ja": "旅行に行った時、たくさん写真を撮りました。"},
  {"lesson": "L11", "trad": "文章", "pinyin": "wénzhāng", "pos": "N", "ja": "記事", "ex_zh": "他寫的文章都很有趣，我很喜歡看。", "ex_py": "Tā xiě de wénzhāng dōu hěn yǒuqù, wǒ hěn xǐhuān kàn.", "ex_ja": "彼が書く記事はどれも面白くて、よく読みます。"}, {"lesson": "L11", "trad": "見面", "pinyin": "jiànmiàn", "pos": "V-sep", "ja": "会う", "ex_zh": "你這個週末有空嗎？我想跟你見面。", "ex_py": "Nǐ zhège zhōumò yǒukòng ma? Wǒ xiǎng gēn nǐ jiànmiàn.", "ex_ja": "今週末は空いていますか？あなたに会いたいです。"}, {"lesson": "L11", "trad": "認識", "pinyin": "rènshì", "pos": "Vpt", "ja": "誰かと知り合うために", "ex_zh": "我上個禮拜認識了一位中文老師。", "ex_py": "Wǒ shàng ge lǐbài rènshì le yī wèi zhōngwén lǎoshī.", "ex_ja": "先週、中国語の先生と知り合いになりました。"}, {"lesson": "L11", "trad": "開始", "pinyin": "kāishǐ", "pos": "Vp", "ja": "始める;始める", "ex_zh": "電影就要開始了，快進來吧！", "ex_py": "Diànyǐng jiùyào kāishǐ le, kuài jìnlái ba!", "ex_ja": "映画がもうすぐ始まりますよ、早く入って！"}, {"lesson": "L11", "trad": "還沒", "pinyin": "hái méi", "pos": "Adv", "ja": "まだ", "ex_zh": "A：你現在要回宿舍嗎？B：還沒，我要先去吃飯再回宿舍。", "ex_py": "A: Nǐ xiànzài yào huí sùshè ma? B: Hái méi, wǒ yào xiān qù chīfàn zài huí sùshè.", "ex_ja": "A：今寮に帰りますか？B：まだです。先ご飯を食べてから寮に帰ります。"},
  {"lesson": "L11", "trad": "還", "pinyin": "hái", "pos": "Adv", "ja": "まだ", "ex_zh": "他上個禮拜生病了，現在還在咳嗽。", "ex_py": "Tā shàng ge lǐbài shēngbìng le, xiànzài hái zài késou.", "ex_ja": "先週病気になって、今もまだ咳をしています。"}, {"lesson": "L11", "trad": "已經", "pinyin": "yǐjīng", "pos": "Adv", "ja": "すでに", "ex_zh": "A：你寫功課了嗎？B：我已經寫了。", "ex_py": "A: Nǐ xiě gōngkè le ma? B: Wǒ yǐjīng xiě le.", "ex_ja": "A：宿題はやりましたか？B：もうやりました。"}, {"lesson": "L11", "trad": "就要", "pinyin": "jiùyào", "pos": "Adv", "ja": "もうすぐだ", "ex_zh": "電影就要開始了，快進來吧！", "ex_py": "Diànyǐng jiùyào kāishǐ le, kuài jìnlái ba!", "ex_ja": "映画がもうすぐ始まりますよ、早く入って！"}, {"lesson": "L11", "trad": "約", "pinyin": "yuē", "pos": "V", "ja": "約束をする", "ex_zh": "週末我有空，要約朋友一起去玩。", "ex_py": "Zhōumò wǒ yǒukòng, yào yuē péngyǒu yīqǐ qù wán.", "ex_ja": "週末は空いているので、友達を誘って一緒に遊びに行きたいです。"}, {"lesson": "L11", "trad": "機會", "pinyin": "jīhuì", "pos": "N", "ja": "チャンス", "ex_zh": "我很少有機會說中文，所以需要多練習。", "ex_py": "Wǒ hěn shǎo yǒu jīhuì shuō zhōngwén, suǒyǐ xūyào duō liànxí.", "ex_ja": "中国語を話す機会がほとんどないので、もっと練習する必要があります。"},
  {"lesson": "L11", "trad": "計畫", "pinyin": "jìhuà", "pos": "N", "ja": "プラン", "ex_zh": "你這個週末有什麼計畫？", "ex_py": "Nǐ zhège zhōumò yǒu shénme jìhuà?", "ex_ja": "今週末は何か計画がありますか？"}, {"lesson": "L11", "trad": "可能", "pinyin": "kěnéng", "pos": "Vaux", "ja": "多分;おそらく", "ex_zh": "我打電話給她，她沒接，可能在睡覺。", "ex_py": "Wǒ dǎ diànhuà gěi tā, tā méi jiē, kěnéng zài shuìjiào.", "ex_ja": "電話したら出なかったので、たぶん寝ていたのかもしれません。"}, {"lesson": "L11", "trad": "以後", "pinyin": "yǐhòu", "pos": "N", "ja": "将来", "ex_zh": "我希望以後可以去他家玩。", "ex_py": "Wǒ xīwàng yǐhòu kěyǐ qù tā jiā wán.", "ex_ja": "将来、彼の家に遊びに行けることを願っています。"}, {"lesson": "L11", "trad": "以前", "pinyin": "yǐqián", "pos": "N", "ja": "過去に", "ex_zh": "以前妹妹很不喜歡穿裙子，現在她覺得穿裙子很舒服。", "ex_py": "Yǐqián mèimei hěn bù xǐhuān chuān qúnzi, xiànzài tā juéde chuān qúnzi hěn shūfu.", "ex_ja": "以前は妹がスカートを嫌いでしたが、今はスカートが快適だと思っています。"}, {"lesson": "L11", "trad": "差不多", "pinyin": "chábuduō", "pos": "Adv", "ja": "について;約", "ex_zh": "A：你每天幾點起床？B：差不多七點。", "ex_py": "A: Nǐ měi tiān jǐ diǎn qǐchuáng? B: Chàbuduō qī diǎn.", "ex_ja": "A：毎日何時に起きますか？B：だいたい7時です。"},
  {"lesson": "L11", "trad": "出去", "pinyin": "chūqù", "pos": "Vi", "ja": "出かける", "ex_zh": "天氣很好，我們一起出去走走吧！", "ex_py": "Tiānqì hěn hǎo, wǒmen yīqǐ chūqù zǒuzǒu ba!", "ex_ja": "天気がいいので、一緒に外へ出かけましょう！"}, {"lesson": "L11", "trad": "看到", "pinyin": "kàndào", "pos": "V", "ja": "（たまたま）見る", "ex_zh": "我常常在電視上看到那位有名的醫生。", "ex_py": "Wǒ chángcháng zài diànshì shàng kàndào nà wèi yǒumíng de yīshēng.", "ex_ja": "テレビであの有名な医者をよく見かけます。"}, {"lesson": "L11", "trad": "但是", "pinyin": "dànshì", "pos": "Conj", "ja": "しかし", "ex_zh": "這個香蕉蛋糕不好看，但是很好吃。", "ex_py": "Zhège xiāngjiāo dàngāo bù hǎokàn, dànshì hěn hǎo chī.", "ex_ja": "このバナナケーキは見た目はよくないですが、とても美味しいです。"}, {"lesson": "L11", "trad": "所以", "pinyin": "suǒyǐ", "pos": "Conj", "ja": "したがって;それで", "ex_zh": "他生病了，所以不能來上課。", "ex_py": "Tā shēngbìng le, suǒyǐ bù néng lái shàngkè.", "ex_ja": "彼は病気になったので、授業に来られません。"}, {"lesson": "L11", "trad": "這樣", "pinyin": "zhèyàng", "pos": "Vs", "ja": "このような;こちらです", "ex_zh": "這家餐廳賣很多蛋糕和冰淇淋，這樣的甜點我都喜歡。", "ex_py": "Zhè jiā cāntīng mài hěn duō dàngāo hé bīngqílín, zhèyàng de tiándiǎn wǒ dōu xǐhuān.", "ex_ja": "このレストランはケーキやアイスクリームをたくさん売っていて、こういったデザートが全部好きです。"},
  {"lesson": "L11", "trad": "特別", "pinyin": "tèbié", "pos": "Vs", "ja": "特別;特定の", "ex_zh": "她今天穿得很特別，大家都看她。", "ex_py": "Tā jīntiān chuān de hěn tèbié, dàjiā dōu kàn tā.", "ex_ja": "彼女は今日とても個性的な服装をしているので、みんなが見ています。"}, {"lesson": "L11", "trad": "了", "pinyin": "le", "pos": "Ptc", "ja": "言葉の助詞。完了したアクションを示す", "ex_zh": "我昨天跟朋友說了很多話，我們都很開心。", "ex_py": "Wǒ zuótiān gēn péngyǒu shuō le hěn duō huà, wǒmen dōu hěn kāixīn.", "ex_ja": "昨日友達とたくさん話して、みんなとても楽しかったです。"}, {"lesson": "L11", "trad": "跟", "pinyin": "gēn", "pos": "Conj", "ja": "そして", "ex_zh": "我想跟你一起去看電影。", "ex_py": "Wǒ xiǎng gēn nǐ yīqǐ qù kàn diànyǐng.", "ex_ja": "あなたと一緒に映画を見に行きたいです。"}, {"lesson": "L11", "trad": "幫", "pinyin": "bāng", "pos": "V", "ja": "助けるために", "ex_zh": "可以請你幫我一個忙嗎？", "ex_py": "Kěyǐ qǐng nǐ bāng wǒ yī ge máng ma?", "ex_ja": "お願いがあるのですが、手伝っていただけますか？"}, {"lesson": "L11", "trad": "回答", "pinyin": "huídá", "pos": "V", "ja": "答えること。返信する", "ex_zh": "我不知道怎麼回答他的問題。", "ex_py": "Wǒ bù zhīdào zěnme huídá tā de wèntí.", "ex_ja": "彼の質問にどう答えればいいかわかりません。"},
  {"lesson": "L11", "trad": "什麼時候", "pinyin": "shénmeshíhòu", "pos": "Phrase", "ja": "いつ..？", "ex_zh": "A：你什麼時候有空？要不要跟我去唱歌？B：我今天下午有空。", "ex_py": "A: Nǐ shénme shíhòu yǒukòng? Yào bú yào gēn wǒ qù chànggē? B: Wǒ jīntiān xiàwǔ yǒukòng.", "ex_ja": "A：いつ暇ですか？一緒にカラオケに行きませんか？B：今日の午後は暇です。"}, {"lesson": "L12", "trad": "工作", "pinyin": "gōngzuò", "pos": "N/Vi", "ja": "仕事;働く", "ex_zh": "我爸爸是老師，他很喜歡他的工作。", "ex_py": "Wǒ bàba shì lǎoshī, tā hěn xǐhuān tā de gōngzuò.", "ex_ja": "父は教師で、自分の仕事がとても好きです。"}, {"lesson": "L12", "trad": "公司", "pinyin": "gōngsī", "pos": "N", "ja": "会社", "ex_zh": "我們公司附近有很多餐廳和飲料店。", "ex_py": "Wǒmen gōngsī fùjìn yǒu hěn duō cāntīng hé yǐnliào diàn.", "ex_ja": "私たちの会社の近くにたくさんのレストランや飲み物店があります。"}, {"lesson": "L12", "trad": "工人", "pinyin": "gōngrén", "pos": "N", "ja": "ワーカー", "ex_zh": "聽說這家工廠的工人都很辛苦，可是老闆給的錢不多。", "ex_py": "Tīngshuō zhè jiā gōngchǎng de gōngrén dōu hěn xīnkǔ, kěshì lǎobǎn gěi de qián bù duō.", "ex_ja": "この工場の工員はみんな大変だと聞いていますが、給料は多くないそうです。"}, {"lesson": "L12", "trad": "工廠", "pinyin": "gōngchǎng", "pos": "N", "ja": "工場", "ex_zh": "聽說這家工廠的工人都很辛苦，可是老闆給的錢不多。", "ex_py": "Tīngshuō zhè jiā gōngchǎng de gōngrén dōu hěn xīnkǔ, kěshì lǎobǎn gěi de qián bù duō.", "ex_ja": "この工場の工員はみんな大変だと聞いていますが、給料は多くないそうです。"},
  {"lesson": "L12", "trad": "同事", "pinyin": "tóngshì", "pos": "N", "ja": "同僚", "ex_zh": "下班以後，我常跟同事一起去吃晚飯。", "ex_py": "Xiàbān yǐhòu, wǒ cháng gēn tóngshì yīqǐ qù chī wǎnfàn.", "ex_ja": "退勤後、私はよく同僚と一緒に夕食を食べに行きます。"}, {"lesson": "L12", "trad": "護理師", "pinyin": "hùlǐshī", "pos": "N", "ja": "看護師", "ex_zh": "我姊姊是這家醫院的護理師。", "ex_py": "Wǒ jiějiě shì zhè jiā yīyuàn de hùlǐshī.", "ex_ja": "姉はこの病院の看護師です。"}, {"lesson": "L12", "trad": "護士", "pinyin": "hùshi", "pos": "N", "ja": "看護師", "ex_zh": "我姊姊是這家醫院的護理師。", "ex_py": "Wǒ jiějiě shì zhè jiā yīyuàn de hùlǐshī.", "ex_ja": "姉はこの病院の看護師です。"}, {"lesson": "L12", "trad": "記者", "pinyin": "jìzhě", "pos": "N", "ja": "レポーター。特派員", "ex_zh": "我覺得當記者不容易，週末常常不能休息。", "ex_py": "Wǒ juéde dāng jìzhě bù róngyì, zhōumò chángcháng bù néng xiūxi.", "ex_ja": "記者になるのは大変で、週末もよく休めないと思います。"}, {"lesson": "L12", "trad": "司機", "pinyin": "sījī", "pos": "N", "ja": "ドライバ", "ex_zh": "那個司機開車開得很慢，我們遲到了。", "ex_py": "Nà ge sījī kāichē kāi de hěn màn, wǒmen chídào le.", "ex_ja": "あの運転手が車をゆっくり運転したので、遅刻しました。"},
  {"lesson": "L12", "trad": "銀行", "pinyin": "yínháng", "pos": "N", "ja": "銀行", "ex_zh": "哥哥畢業了，下個月要去銀行工作。", "ex_py": "Gēgē bìyè le, xià ge yuè yào qù yínháng gōngzuò.", "ex_ja": "兄が卒業して、来月銀行で働きます。"}, {"lesson": "L12", "trad": "冷氣(機)", "pinyin": "lěngqì(jī)", "pos": "N", "ja": "エアコン）", "ex_zh": "今天辦公室的冷氣不冷，可能冷氣機有問題。", "ex_py": "Jīntiān bàngōngshì de lěngqì bù lěng, kěnéng lěngqìjī yǒu wèntí.", "ex_ja": "今日オフィスのエアコンが効いていないので、エアコンに問題があるかもしれません。"}, {"lesson": "L12", "trad": "父母", "pinyin": "fùmǔ", "pos": "N", "ja": "両親", "ex_zh": "她的父母都在學校當老師。", "ex_py": "Tā de fùmǔ dōu zài xuéxiào dāng lǎoshī.", "ex_ja": "彼女の両親はどちらも学校で先生をしています。"}, {"lesson": "L12", "trad": "父親", "pinyin": "fùqīn", "pos": "N", "ja": "父親", "ex_zh": "我父親文章寫得很好，而且他的字也很漂亮。", "ex_py": "Wǒ fùqīn wénzhāng xiě de hěn hǎo, érqiě tā de zì yě hěn piàoliang.", "ex_ja": "父は文章を書くのが上手で、しかも字もきれいです。"}, {"lesson": "L12", "trad": "母親", "pinyin": "mǔqīn", "pos": "N", "ja": "母親", "ex_zh": "我母親常對我說：「你要多看書，少玩手機。」", "ex_py": "Wǒ mǔqīn cháng duì wǒ shuō: 'Nǐ yào duō kàn shū, shǎo wán shǒujī.'", "ex_ja": "母はよく私に「本をたくさん読んで、スマホを少なくしなさい」と言います。"},
  {"lesson": "L12", "trad": "女兒", "pinyin": "nǚér", "pos": "N", "ja": "娘", "ex_zh": "李先生有三個孩子，一個兒子，兩個女兒。", "ex_py": "Lǐ xiānsheng yǒu sān ge háizi, yī ge érzi, liǎng ge nǚér.", "ex_ja": "李さんには子供が3人いて、息子が1人、娘が2人います。"}, {"lesson": "L12", "trad": "成績", "pinyin": "chéngjì", "pos": "N", "ja": "成績", "ex_zh": "你這學期的成績進步了，太好了！", "ex_py": "Nǐ zhè xuéqī de chéngjì jìnbù le, tài hǎo le!", "ex_ja": "今学期の成績が上がって、よかったです！"}, {"lesson": "L12", "trad": "小時", "pinyin": "xiǎoshí", "pos": "N", "ja": "時間", "ex_zh": "一個小時以前，他還在這裡。", "ex_py": "Yī ge xiǎoshí yǐqián, tā hái zài zhèlǐ.", "ex_ja": "1時間前、彼はまだここにいました。"}, {"lesson": "L12", "trad": "鐘頭", "pinyin": "zhōngtóu", "pos": "N", "ja": "時間", "ex_zh": "一個小時以前，他還在這裡。", "ex_py": "Yī ge xiǎoshí yǐqián, tā hái zài zhèlǐ.", "ex_ja": "1時間前、彼はまだここにいました。"}, {"lesson": "L12", "trad": "分鐘", "pinyin": "fēnzhōng", "pos": "M", "ja": "分", "ex_zh": "十分鐘以前我給他打了一個電話。", "ex_py": "Shí fēnzhōng yǐqián wǒ gěi tā dǎ le yī ge diànhuà.", "ex_ja": "10分前に彼に電話しました。"},
  {"lesson": "L12", "trad": "畢業", "pinyin": "bìyè", "pos": "Vp-sep", "ja": "卒業する", "ex_zh": "哥哥畢業了，下個月要去銀行工作。", "ex_py": "Gēgē bìyè le, xià ge yuè yào qù yínháng gōngzuò.", "ex_ja": "兄が卒業して、来月銀行で働きます。"}, {"lesson": "L12", "trad": "結婚", "pinyin": "jiéhūn", "pos": "Vp-sep", "ja": "結婚する", "ex_zh": "結婚以前，他覺得工作最重要，現在他覺得家人最重要。", "ex_py": "Jiéhūn yǐqián, tā juéde gōngzuò zuì zhōngyào, xiànzài tā juéde jiārén zuì zhōngyào.", "ex_ja": "結婚前は仕事が最も大切だと思っていたが、今は家族が最も大切だと思っています。"}, {"lesson": "L12", "trad": "上班", "pinyin": "shàngbān", "pos": "V-sep", "ja": "仕事に行く", "ex_zh": "我們八點半開始上班，我每天都準時到公司。", "ex_py": "Wǒmen bādiǎn bàn kāishǐ shàngbān, wǒ měi tiān dōu zhǔnshí dào gōngsī.", "ex_ja": "8時半から仕事が始まり、私は毎日時間通りに会社に着きます。"}, {"lesson": "L12", "trad": "下班", "pinyin": "xiàbān", "pos": "V-sep", "ja": "任務を降りる", "ex_zh": "下班以後，她常跟朋友一起去跑步。", "ex_py": "Xiàbān yǐhòu, tā cháng gēn péngyǒu yīqǐ qù pǎobù.", "ex_ja": "退勤後、彼女はよく友達と一緒に走りに行きます。"}, {"lesson": "L12", "trad": "談話", "pinyin": "tánhuà", "pos": "V-sep", "ja": "会話する", "ex_zh": "老闆要跟我們談話，想知道我們工作做得怎麼樣。", "ex_py": "Lǎobǎn yào gēn wǒmen tánhuà, xiǎng zhīdào wǒmen gōngzuò zuò de zěnmeyàng.", "ex_ja": "上司が私たちと話したがっていて、仕事がどうなっているかを知りたいそうです。"},
  {"lesson": "L12", "trad": "談", "pinyin": "tán", "pos": "V", "ja": "話す", "ex_zh": "現在我沒有時間，明天再跟你談這個問題。", "ex_py": "Xiànzài wǒ méiyǒu shíjiān, míngtiān zài gēn nǐ tán zhège wèntí.", "ex_ja": "今は時間がないので、明日またこの問題について話しましょう。"}, {"lesson": "L12", "trad": "當", "pinyin": "dāng", "pos": "Vst", "ja": "なる", "ex_zh": "A：你覺得我可以當老師嗎？B：如果你想當，一定有機會。", "ex_py": "A: Nǐ juéde wǒ kěyǐ dāng lǎoshī ma? B: Rúguǒ nǐ xiǎng dāng, yīdìng yǒu jīhuì.", "ex_ja": "A：私は先生になれると思いますか？B：なりたいなら、きっとチャンスがあります。"}, {"lesson": "L12", "trad": "辦公室", "pinyin": "bàngōngshì", "pos": "N", "ja": "オフィス", "ex_zh": "今天辦公室的冷氣不冷，可能冷氣機有問題。", "ex_py": "Jīntiān bàngōngshì de lěngqì bù lěng, kěnéng lěngqìjī yǒu wèntí.", "ex_ja": "今日オフィスのエアコンが効いていないので、エアコンに問題があるかもしれません。"}, {"lesson": "L12", "trad": "重要", "pinyin": "zhōngyào", "pos": "Vs", "ja": "重要", "ex_zh": "結婚以前，他覺得工作最重要，現在他覺得家人最重要。", "ex_py": "Jiéhūn yǐqián, tā juéde gōngzuò zuì zhōngyào, xiànzài tā juéde jiārén zuì zhōngyào.", "ex_ja": "結婚前は仕事が最も大切だと思っていたが、今は家族が最も大切だと思っています。"}, {"lesson": "L12", "trad": "辛苦", "pinyin": "xīnkǔ", "pos": "Vs", "ja": "難しい;厳しい（人生、仕事）", "ex_zh": "他每天早上去上班，晚上去上課，真辛苦！", "ex_py": "Tā měi tiān zǎoshàng qù shàngbān, wǎnshàng qù shàngkè, zhēn xīnkǔ!", "ex_ja": "毎日朝は仕事に行って、夜は授業があって、本当に大変です！"},
  {"lesson": "L12", "trad": "用", "pinyin": "yòng", "pos": "Prep", "ja": "使用する;と", "ex_zh": "我常常用中文給台灣朋友寫信。", "ex_py": "Wǒ chángcháng yòng zhōngwén gěi Táiwān péngyǒu xiě xìn.", "ex_ja": "よく中国語で台湾の友達に手紙を書きます。"}, {"lesson": "L12", "trad": "自己", "pinyin": "zìjǐ", "pos": "N", "ja": "自分", "ex_zh": "這件事情他自己可以做，不需要我們幫忙。", "ex_py": "Zhè jiàn shìqíng tā zìjǐ kěyǐ zuò, bù xūyào wǒmen bāngmáng.", "ex_ja": "この件は彼自身でできます。私たちの助けは必要ありません。"}, {"lesson": "L12", "trad": "以後", "pinyin": "yǐhòu", "pos": "N", "ja": "後;その後", "ex_zh": "考試開始以後，我們不可以跟同學說話。", "ex_py": "Kǎoshì kāishǐ yǐhòu, wǒmen bù kěyǐ gēn tóngxué shuōhuà.", "ex_ja": "試験が始まったら、クラスメートと話してはいけません。"}, {"lesson": "L12", "trad": "以前", "pinyin": "yǐqián", "pos": "N", "ja": "前に;以前は", "ex_zh": "我去上課以前，一定會先在家吃早飯。", "ex_py": "Wǒ qù shàngkè yǐqián, yīdìng huì xiān zài jiā chī zǎofàn.", "ex_ja": "授業に行く前に、必ず家で朝食を食べます。"}, {"lesson": "L12", "trad": "決定", "pinyin": "juédìng", "pos": "Vp/N", "ja": "決めること。決断", "ex_zh": "她最近常常生病，她決定以後多運動。", "ex_py": "Tā zuìjìn chángcháng shēngbìng, tā juédìng yǐhòu duō yùndòng.", "ex_ja": "彼女は最近よく病気になるので、これからもっと運動しようと決心しました。"},
  {"lesson": "L12", "trad": "準備", "pinyin": "zhǔnbèi", "pos": "V", "ja": "準備する", "ex_zh": "今天是我的生日，媽媽準備了很多我愛吃的菜。", "ex_py": "Jīntiān shì wǒ de shēngrì, māma zhǔnbèi le hěn duō wǒ ài chī de cài.", "ex_ja": "今日は私の誕生日で、お母さんは私の好きな料理をたくさん作ってくれました。"}, {"lesson": "L12", "trad": "準時", "pinyin": "zhǔnshí", "pos": "Vs", "ja": "時間通りに", "ex_zh": "我們八點半開始上班，我每天都準時到公司。", "ex_py": "Wǒmen bādiǎn bàn kāishǐ shàngbān, wǒ měi tiān dōu zhǔnshí dào gōngsī.", "ex_ja": "8時半から仕事が始まり、私は毎日時間通りに会社に着きます。"}, {"lesson": "L12", "trad": "而且", "pinyin": "érqiě", "pos": "Conj", "ja": "さらに", "ex_zh": "這家飯店又方便又乾淨，而且不貴。", "ex_py": "Zhè jiā fàndiàn yòu fāngbiàn yòu gānjìng, érqiě bú guì.", "ex_ja": "このホテルは便利できれいで、しかも安いです。"}, {"lesson": "L12", "trad": "遲到", "pinyin": "chídào", "pos": "Vp", "ja": "遅れて来る", "ex_zh": "他今天上班遲到了，老闆不太高興。", "ex_py": "Tā jīntiān shàngbān chídào le, lǎobǎn bú tài gāoxìng.", "ex_ja": "彼は今日仕事に遅刻して、上司があまり喜んでいません。"}, {"lesson": "L12", "trad": "節目", "pinyin": "jiémù", "pos": "N", "ja": "(テレビ) 番組またはショー", "ex_zh": "最近有什麼好看的電視節目？", "ex_py": "Zuìjìn yǒu shénme hǎokàn de diànshì jiémù?", "ex_ja": "最近おもしろいテレビ番組は何かありますか？"},
  {"lesson": "L12", "trad": "兒子", "pinyin": "érzi", "pos": "N", "ja": "息子", "ex_zh": "李先生有三個孩子，一個兒子，兩個女兒。", "ex_py": "Lǐ xiānsheng yǒu sān ge háizi, yī ge érzi, liǎng ge nǚér.", "ex_ja": "李さんには子供が3人いて、息子が1人、娘が2人います。"}, {"lesson": "L13", "trad": "電子郵件", "pinyin": "diànzǐ yóujiàn", "pos": "N", "ja": "電子メール", "ex_zh": "我每天都會收到很多電子郵件。", "ex_py": "Wǒ měi tiān dōu huì shōudào hěn duō diànzǐ yóujiàn.", "ex_ja": "毎日たくさんのメールが届きます。"}, {"lesson": "L13", "trad": "圖片", "pinyin": "túpiàn", "pos": "N", "ja": "写真;写真", "ex_zh": "這個網站上的圖片很多，而且都很好看。", "ex_py": "Zhège wǎngzhàn shàng de túpiàn hěn duō, érqiě dōu hěn hǎokàn.", "ex_ja": "このWebサイトには写真がたくさんあって、しかもどれもきれいです。"}, {"lesson": "L13", "trad": "照相機", "pinyin": "zhàoxiàngjī", "pos": "N", "ja": "カメラ", "ex_zh": "A：這個照相機是誰的？B：是我爸爸的。", "ex_py": "A: Zhège zhàoxiàngjī shì shéi de? B: Shì wǒ bàba de.", "ex_ja": "A：このカメラは誰のですか？B：私の父のです。"}, {"lesson": "L13", "trad": "照相機", "pinyin": "zhàoxiàngjī", "pos": "V-sep", "ja": "写真を撮る", "ex_zh": "我弟弟很喜歡幫人照相。", "ex_py": "Wǒ dìdi hěn xǐhuān bāng rén zhàoxiàng.", "ex_ja": "弟は人の写真を撮るのがとても好きです。"},
  {"lesson": "L13", "trad": "地址", "pinyin": "dìzhǐ", "pos": "N", "ja": "住所", "ex_zh": "你知道他家的地址嗎？", "ex_py": "Nǐ zhīdào tā jiā de dìzhǐ ma?", "ex_ja": "彼の家の住所を知っていますか？"}, {"lesson": "L13", "trad": "門口", "pinyin": "ménkǒu", "pos": "N", "ja": "戸口;ゲート", "ex_zh": "我明天早上十點會在學校門口等你。", "ex_py": "Wǒ míngtiān zǎoshàng shí diǎn huì zài xuéxiào ménkǒu děng nǐ.", "ex_ja": "明日の朝10時に学校の入口で待っています。"}, {"lesson": "L13", "trad": "十字路口", "pinyin": "shízìlùkǒu", "pos": "N", "ja": "交差点", "ex_zh": "你往前走，過第二個十字路口，就到了。", "ex_py": "Nǐ wǎng qián zǒu, guò dì èr ge shízì lùkǒu, jiù dào le.", "ex_ja": "まっすぐ進んで、2つ目の交差点を過ぎると着きます。"}, {"lesson": "L13", "trad": "大樓", "pinyin": "dàlóu", "pos": "N", "ja": "建物", "ex_zh": "我家在台北101大樓附近。", "ex_py": "Wǒ jiā zài Táiběi Yīlíngyī dàlóu fùjìn.", "ex_ja": "私の家は台北101ビルの近くにあります。"}, {"lesson": "L13", "trad": "博物館", "pinyin": "bówùguǎn", "pos": "N", "ja": "博物館", "ex_zh": "老師下禮拜要帶我們去博物館參觀。", "ex_py": "Lǎoshī xià lǐbài yào dài wǒmen qù bówùguǎn cānguān.", "ex_ja": "来週先生が博物館に連れて行ってくれます。"},
  {"lesson": "L13", "trad": "故事", "pinyin": "gùshi", "pos": "N", "ja": "話;物語", "ex_zh": "我看過很多有趣的歷史故事。", "ex_py": "Wǒ kànguò hěn duō yǒuqù de lìshǐ gùshi.", "ex_ja": "面白い歴史の話をたくさん読んだことがあります。"}, {"lesson": "L13", "trad": "生活", "pinyin": "shēnghuó", "pos": "N", "ja": "人生", "ex_zh": "我在台灣的生活不錯，很喜歡這裡，也有很多好朋友。", "ex_py": "Wǒ zài Táiwān de shēnghuó bú cuò, hěn xǐhuān zhèlǐ, yě yǒu hěn duō hǎo péngyǒu.", "ex_ja": "台湾での生活はなかなかよくて、ここが好きで、いい友達もたくさんいます。"}, {"lesson": "L13", "trad": "聲音", "pinyin": "shēngyīn", "pos": "N", "ja": "音;声", "ex_zh": "你聽，這是什麼聲音？", "ex_py": "Nǐ tīng, zhè shì shénme shēngyīn?", "ex_ja": "聞いてください、これは何の音ですか？"}, {"lesson": "L13", "trad": "科學", "pinyin": "kēxué", "pos": "N", "ja": "科学", "ex_zh": "語言和科學我都很喜歡。", "ex_py": "Yǔyán hé kēxué wǒ dōu hěn xǐhuān.", "ex_ja": "言語と科学がどちらも好きです。"}, {"lesson": "L13", "trad": "歷史", "pinyin": "lìshǐ", "pos": "N", "ja": "歴史", "ex_zh": "我看過很多有趣的歷史故事。", "ex_py": "Wǒ kànguò hěn duō yǒuqù de lìshǐ gùshi.", "ex_ja": "面白い歴史の話をたくさん読んだことがあります。"},
  {"lesson": "L13", "trad": "世界", "pinyin": "shìjiè", "pos": "N", "ja": "世界", "ex_zh": "世界很大，沒去過的地方我都想去。", "ex_py": "Shìjiè hěn dà, méi qùguò de dìfāng wǒ dōu xiǎng qù.", "ex_ja": "世界は広くて、まだ行ったことのない場所には全部行ってみたいです。"}, {"lesson": "L13", "trad": "世界上", "pinyin": "shìjiè shàng", "pos": "Phrase", "ja": "世界で", "ex_zh": "你知道現在世界上有多少人嗎？", "ex_py": "Nǐ zhīdào xiànzài shìjiè shàng yǒu duōshǎo rén ma?", "ex_ja": "今世界に何人の人がいるか知っていますか？"}, {"lesson": "L13", "trad": "往", "pinyin": "wǎng", "pos": "Prep", "ja": "に向かって", "ex_zh": "你先往左轉，再往右轉，就到那家餐廳了。", "ex_py": "Nǐ xiān wǎng zuǒ zhuǎn, zài wǎng yòu zhuǎn, jiù dào nà jiā cāntīng le.", "ex_ja": "まず左に曲がって、次に右に曲がると、そのレストランに着きます。"}, {"lesson": "L13", "trad": "參觀", "pinyin": "cānguān", "pos": "V", "ja": "訪問する（インスタレーション、場所）", "ex_zh": "老闆今天帶我去參觀了一家工廠。", "ex_py": "Lǎobǎn jīntiān dài wǒ qù cānguān le yī jiā gōngchǎng.", "ex_ja": "上司が今日工場を見学させてくれました。"}, {"lesson": "L13", "trad": "進來", "pinyin": "jìnlái", "pos": "Vi", "ja": "入ってくる。入る", "ex_zh": "外面很冷，請進來吧！", "ex_py": "Wàimiàn hěn lěng, qǐng jìnlái ba!", "ex_ja": "外は寒いので、どうぞ中に入ってください！"},
  {"lesson": "L13", "trad": "轉", "pinyin": "zhuǎn", "pos": "V", "ja": "回す", "ex_zh": "你先往左轉，再往右轉，就到那家餐廳了。", "ex_py": "Nǐ xiān wǎng zuǒ zhuǎn, zài wǎng yòu zhuǎn, jiù dào nà jiā cāntīng le.", "ex_ja": "まず左に曲がって、次に右に曲がると、そのレストランに着きます。"}, {"lesson": "L13", "trad": "馬上", "pinyin": "mǎshàng", "pos": "Adv", "ja": "すぐに;すぐに", "ex_zh": "我問了他一個問題，他馬上就回答了。", "ex_py": "Wǒ wèn le tā yī ge wèntí, tā mǎshàng jiù huídá le.", "ex_ja": "彼に質問したら、すぐに答えてくれました。"}, {"lesson": "L13", "trad": "喂", "pinyin": "wèi", "pos": "Ptc", "ja": "こんにちは（電話で）", "ex_zh": "喂，請問王宜文小姐在嗎？", "ex_py": "Wèi, qǐngwèn Wáng Yíwén xiǎojiě zài ma?", "ex_ja": "もしもし、王宜文さんはいらっしゃいますか？"}, {"lesson": "L13", "trad": "真的", "pinyin": "zhēnde", "pos": "Adv", "ja": "本当に;本当に", "ex_zh": "A：他今天不來了。B：真的嗎？", "ex_py": "A: Tā jīntiān bù lái le. B: Zhēnde ma?", "ex_ja": "A：彼は今日来なくなりました。B：本当ですか？"}, {"lesson": "L13", "trad": "壞", "pinyin": "huài", "pos": "Vs/Vp", "ja": "悪い/壊れた;故障中", "ex_zh": "我的舊電腦壞了，我打算買一部新的。", "ex_py": "Wǒ de jiù diànnǎo huài le, wǒ dǎsuàn mǎi yī bù xīn de.", "ex_ja": "古いパソコンが壊れたので、新しいものを買おうと思っています。"},
  {"lesson": "L13", "trad": "左(邊)", "pinyin": "zuǒ (biān)", "pos": "N", "ja": "左側", "ex_zh": "你先往左轉，再往右轉，就到那家餐廳了。", "ex_py": "Nǐ xiān wǎng zuǒ zhuǎn, zài wǎng yòu zhuǎn, jiù dào nà jiā cāntīng le.", "ex_ja": "まず左に曲がって、次に右に曲がると、そのレストランに着きます。"}, {"lesson": "L13", "trad": "第", "pinyin": "dì", "pos": "Det", "ja": "序数を形成する機能語", "ex_zh": "他是我們班第一個來的同學。", "ex_py": "Tā shì wǒmen bān dì yī ge lái de tóngxué.", "ex_ja": "彼はクラスで最初に来た同学です。"}, {"lesson": "L13", "trad": "不好意思", "pinyin": "bùhǎoyìsi", "pos": "Phrase", "ja": "恥ずかしいと感じること。ごめんなさい;すみません", "ex_zh": "不好意思，我遲到了。", "ex_py": "Bùhǎoyìsi, wǒ chídào le.", "ex_ja": "すみません、遅刻しました。"}, {"lesson": "L13", "trad": "警察", "pinyin": "jǐngchá", "pos": "N", "ja": "警察;警官", "ex_zh": "我在路口看到一個警察，就去問他怎麼走。", "ex_py": "Wǒ zài lùkǒu kàndào yī ge jǐngchá, jiù qù wèn tā zěnme zǒu.", "ex_ja": "交差点で警察官を見かけたので、道を聞きに行きました。"}, {"lesson": "L13", "trad": "排隊", "pinyin": "páiduì", "pos": "V-sep", "ja": "並ぶこと。列に並ぶ", "ex_zh": "現在坐捷運的人很多，我們需要排隊。", "ex_py": "Xiànzài zuò jiéyùn de rén hěn duō, wǒmen xūyào páiduì.", "ex_ja": "今MRTに乗る人が多いので、列に並ぶ必要があります。"},
  {"lesson": "L13", "trad": "超級市場/超市", "pinyin": "chāojí shìchǎng", "pos": "N", "ja": "スーパーマーケット", "ex_zh": "你不要忘記去超級市場買飲料。", "ex_py": "Nǐ bú yào wàngjì qù chāojí shìchǎng mǎi yǐnliào.", "ex_ja": "スーパーに飲み物を買いに行くのを忘れないでください。"}, {"lesson": "L13", "trad": "忘了", "pinyin": "wàngle", "pos": "Phrase", "ja": "忘れる", "ex_zh": "你不要忘了告訴他明天有考試。", "ex_py": "Nǐ bú yào wàngle gàosù tā míngtiān yǒu kǎoshì.", "ex_ja": "明日試験があることを彼に伝えるのを忘れないでください。"}, {"lesson": "L13", "trad": "大聲", "pinyin": "dàshēng", "pos": "Vs", "ja": "うるさい", "ex_zh": "兒子跟女兒都在睡覺，你不要說得太大聲。", "ex_py": "Érzi gēn nǚér dōu zài shuìjiào, nǐ bú yào shuō de tài dàshēng.", "ex_ja": "息子と娘が寝ているので、大きな声で話さないでください。"}, {"lesson": "L14", "trad": "活動", "pinyin": "huódòng", "pos": "N", "ja": "活動;イベント", "ex_zh": "來台灣以後，每個週末我都有很多活動，覺得很開心。", "ex_py": "Lái Táiwān yǐhòu, měi ge zhōumò wǒ dōu yǒu hěn duō huódòng, juéde hěn kāixīn.", "ex_ja": "台湾に来てから、毎週末たくさんの活動があって、とても楽しいです。"}, {"lesson": "L14", "trad": "演唱會", "pinyin": "yǎnchànghui", "pos": "N", "ja": "コンサート", "ex_zh": "這個週末有一場演唱會，你要不要跟我一起去看？", "ex_py": "Zhège zhōumò yǒu yī chǎng yǎnchànghuì, nǐ yào bú yào gēn wǒ yīqǐ qù kàn?", "ex_ja": "今週末コンサートがあるのですが、一緒に見に行きませんか？"},
  {"lesson": "L14", "trad": "演唱", "pinyin": "yǎnchàng", "pos": "V", "ja": "パフォーマンスで歌うこと", "ex_zh": "她在舞台上演唱了三首歌，大家都很喜歡。", "ex_py": "Tā zài wútái shàng yǎnchàng le sān shǒu gē, dàjiā dōu hěn xǐhuān.", "ex_ja": "彼女はステージで3曲歌い、みんなとても喜んでいました。"}, {"lesson": "L14", "trad": "表演", "pinyin": "biǎoyǎn", "pos": "N", "ja": "パフォーマンス;活動;遊ぶ", "ex_zh": "今天晚會上的表演都非常好看。", "ex_py": "Jīntiān wǎnhuì shàng de biǎoyǎn dōu fēicháng hǎokàn.", "ex_ja": "今日のパーティーの出し物はどれもとてもよかったです。"}, {"lesson": "L14", "trad": "場", "pinyin": "cháng", "pos": "M", "ja": "コンサートの言葉を測る", "ex_zh": "今年我看了兩場演唱會，非常開心。", "ex_py": "Jīnnián wǒ kàn le liǎng chǎng yǎnchànghuì, fēicháng kāixīn.", "ex_ja": "今年コンサートを2回見て、とても嬉しかったです。"}, {"lesson": "L14", "trad": "餃子", "pinyin": "jiǎozi", "pos": "N", "ja": "餃子（肉と野菜の詰め物入り）", "ex_zh": "如果你不想吃飯，可以只吃幾個餃子。", "ex_py": "Rúguǒ nǐ bù xiǎng chī fàn, kěyǐ zhǐ chī jǐ ge jiǎozi.", "ex_ja": "ご飯を食べたくない場合は、餃子だけ食べてもいいです。"}, {"lesson": "L14", "trad": "小籠包", "pinyin": "xiǎolóngbāo", "pos": "N", "ja": "水餃子。小籠包", "ex_zh": "我很喜歡吃小籠包，湯汁很多，非常好吃。", "ex_py": "Wǒ hěn xǐhuān chī xiǎolóngbāo, tāngzhī hěn duō, fēicháng hǎo chī.", "ex_ja": "小籠包が大好きで、スープがたっぷりで、とても美味しいです。"},
  {"lesson": "L14", "trad": "湯", "pinyin": "tāng", "pos": "N", "ja": "スープ", "ex_zh": "天氣熱的時候，我不喜歡喝熱湯。", "ex_py": "Tiānqì rè de shíhòu, wǒ bù xǐhuān hē rè tāng.", "ex_ja": "天気が暑い時は、熱いスープを飲むのが好きではありません。"}, {"lesson": "L14", "trad": "肉", "pinyin": "ròu", "pos": "N", "ja": "肉", "ex_zh": "我喜歡吃肉，可是我吃得不多。", "ex_py": "Wǒ xǐhuān chī ròu, kěshì wǒ chī de bù duō.", "ex_ja": "肉が好きですが、あまりたくさんは食べません。"}, {"lesson": "L14", "trad": "魚", "pinyin": "yú", "pos": "N", "ja": "魚", "ex_zh": "這條魚很好吃，你多吃點兒。", "ex_py": "Zhè tiáo yú hěn hǎo chī, nǐ duō chī diǎnr.", "ex_ja": "この魚はとても美味しいので、もっと食べてください。"}, {"lesson": "L14", "trad": "牛", "pinyin": "niú", "pos": "N", "ja": "牛;牛;牛", "ex_zh": "從這裡往山上走，你就會看到很多牛。", "ex_py": "Cóng zhèlǐ wǎng shān shàng zǒu, nǐ jiù huì kàndào hěn duō niú.", "ex_ja": "ここから山の方へ進むと、たくさんの牛が見えます。"}, {"lesson": "L14", "trad": "教堂", "pinyin": "jiàotáng", "pos": "N", "ja": "教会", "ex_zh": "我每個星期天早上都跟家人去教堂。", "ex_py": "Wǒ měi ge xīngqītiān zǎoshàng dōu gēn jiārén qù jiàotáng.", "ex_ja": "毎週日曜日の朝、家族と一緒に教会に行きます。"},
  {"lesson": "L14", "trad": "交通", "pinyin": "jiāotōng", "pos": "N", "ja": "渋滞;コミュニケーション。交通機関", "ex_zh": "從我家去捷運站，過一條街就到了，交通很方便。", "ex_py": "Cóng wǒ jiā qù jiéyùn zhàn, guò yī tiáo jiē jiù dào le, jiāotōng hěn fāngbiàn.", "ex_ja": "私の家からMRT駅まで、一本道を渡るだけで着いて、交通がとても便利です。"}, {"lesson": "L14", "trad": "環境", "pinyin": "huánjìng", "pos": "N", "ja": "環境;周囲;状況", "ex_zh": "這裡的環境不錯，可是附近沒有捷運站，交通不方便。", "ex_py": "Zhèlǐ de huánjìng bú cuò, kěshì fùjìn méiyǒu jiéyùn zhàn, jiāotōng bù fāngbiàn.", "ex_ja": "ここの環境はなかなかいいですが、近くにMRT駅がないので交通が不便です。"}, {"lesson": "L14", "trad": "同意", "pinyin": "tóngyì", "pos": "Vst", "ja": "同意する", "ex_zh": "A：我覺得語言比數學有趣多了。B：我同意你說的。", "ex_py": "A: Wǒ juéde yǔyán bǐ shùxué yǒuqù duō le. B: Wǒ tóngyì nǐ shuō de.", "ex_ja": "A：言語は数学よりずっと面白いと思います。B：あなたの言う通りだと思います。"}, {"lesson": "L14", "trad": "歡迎", "pinyin": "huānyíng", "pos": "Vst", "ja": "いらっしゃいませ", "ex_zh": "大家都歡迎新老師到我們學校來。", "ex_py": "Dàjiā dōu huānyíng xīn lǎoshī dào wǒmen xuéxiào lái.", "ex_ja": "みんなが新しい先生を学校に歓迎しています。"}, {"lesson": "L14", "trad": "慶祝", "pinyin": "qìngzhù", "pos": "V", "ja": "祝うために", "ex_zh": "你知道台灣人怎麼慶祝新年嗎？", "ex_py": "Nǐ zhīdào Táiwān rén zěnme qìngzhù xīnnián ma?", "ex_ja": "台湾人がどのように新年を祝うか知っていますか？"},
  {"lesson": "L14", "trad": "帶", "pinyin": "dài", "pos": "V", "ja": "持ってくる;取る", "ex_zh": "你要出門了，記得帶手機和錢包。", "ex_py": "Nǐ yào chūmén le, jìde dài shǒujī hé qiánbāo.", "ex_ja": "外出するときは、スマートフォンと財布を持って行くのを忘れずに。"}, {"lesson": "L14", "trad": "戴", "pinyin": "dài", "pos": "V", "ja": "身につけるもの（帽子、メガネ、アクセサリーなど）", "ex_zh": "今天風很大，你最好戴帽子。", "ex_py": "Jīntiān fēng hěn dà, nǐ zuìhǎo dài màozi.", "ex_ja": "今日は風が強いので、帽子をかぶった方がいいですよ。"}, {"lesson": "L14", "trad": "拿", "pinyin": "ná", "pos": "V", "ja": "取る;保持する。運ぶ", "ex_zh": "你手裡拿的東西是什麼？", "ex_py": "Nǐ shǒu lǐ ná de dōngxi shì shénme?", "ex_ja": "手に持っているのは何ですか？"}, {"lesson": "L14", "trad": "跨年", "pinyin": "kuàinián", "pos": "V", "ja": "大晦日を祝うために", "ex_zh": "今年你想要跟誰一起跨年？", "ex_py": "Jīnnián nǐ xiǎng yào gēn shéi yīqǐ kuànián?", "ex_ja": "今年は誰と大晦日を過ごしたいですか？"}, {"lesson": "L14", "trad": "重", "pinyin": "zhòng", "pos": "Vs", "ja": "重い（体重に関係する）", "ex_zh": "帶這麼重的東西，走了兩個小時，我覺得很累。", "ex_py": "Dài zhème zhòng de dōngxi, zǒu le liǎng ge xiǎoshí, wǒ juéde hěn lèi.", "ex_ja": "こんなに重いものを持って2時間歩いて、とても疲れました。"},
  {"lesson": "L14", "trad": "住", "pinyin": "zhù", "pos": "V", "ja": "生きること。住むこと。滞在する", "ex_zh": "我已經在台灣住了三十年了。", "ex_py": "Wǒ yǐjīng zài Táiwān zhù le sānshí nián le.", "ex_ja": "台湾に住んで30年になります。"}, {"lesson": "L14", "trad": "熱鬧", "pinyin": "rènào", "pos": "Vs", "ja": "活気のある;騒音と興奮で賑わう", "ex_zh": "每天早上這裡都有很多人在運動，非常熱鬧。", "ex_py": "Měi tiān zǎoshàng zhèlǐ dōu yǒu hěn duō rén zài yùndòng, fēicháng rènào.", "ex_ja": "毎朝ここでたくさんの人が運動していて、とても賑やかです。"}, {"lesson": "L14", "trad": "代表", "pinyin": "dāibiǎo", "pos": "N", "ja": "みんな", "ex_zh": "她是我們學校的代表，去參加全國比賽。", "ex_py": "Tā shì wǒmen xuéxiào de dàibiǎo, qù cānjiā quánguó bǐsài.", "ex_ja": "彼女は学校の代表として全国大会に参加しました。"}, {"lesson": "L14", "trad": "公園", "pinyin": "gōngyuán", "pos": "N", "ja": "公園", "ex_zh": "我們往前走，很快就到公園了。", "ex_py": "Wǒmen wǎng qián zǒu, hěn kuài jiù dào gōngyuán le.", "ex_ja": "まっすぐ進むと、すぐに公園に着きます。"}, {"lesson": "L14", "trad": "台北", "pinyin": "Táiběi", "pos": "N", "ja": "台北", "ex_zh": "台北是台灣的首都，也是最大的城市。", "ex_py": "Táiběi shì Táiwān de shǒudū, yě shì zuì dà de chéngshì.", "ex_ja": "台北は台湾の首都であり、最大の都市でもあります。"},
  {"lesson": "L14", "trad": "台北101", "pinyin": "Táiběi Yīlíngyī", "pos": "N", "ja": "台北101", "ex_zh": "台北101有跨年煙火，每年很多人來這裡看。", "ex_py": "Táiběi Yīlíngyī yǒu kuànián yānhuǒ, měi nián hěn duō rén lái zhèlǐ kàn.", "ex_ja": "台北101では大晦日の花火があり、毎年たくさんの人が見に来ます。"}, {"lesson": "L14", "trad": "新年", "pinyin": "xīnnián", "pos": "N", "ja": "新年", "ex_zh": "你參加過什麼有趣的新年活動？", "ex_py": "Nǐ cānjiāguò shénme yǒuqù de xīnnián huódòng?", "ex_ja": "面白い新年のイベントに参加したことはありますか？"}, {"lesson": "L14", "trad": "最後", "pinyin": "zuìhòu", "pos": "N", "ja": "最後の", "ex_zh": "我買了三個麵包，吃了兩個了，最後一個明天再吃。", "ex_py": "Wǒ mǎi le sān ge miànbāo, chī le liǎng ge le, zuìhòu yī ge míngtiān zài chī.", "ex_ja": "パンを3つ買って、2つ食べました。最後の1つは明日食べます。"}, {"lesson": "L14", "trad": "那麼", "pinyin": "nàme", "pos": "Adv", "ja": "それで", "ex_zh": "你很餓嗎？為什麼吃得那麼快？", "ex_py": "Nǐ hěn è ma? Wèishénme chī de nàme kuài?", "ex_ja": "お腹がとても空いていますか？どうしてそんなに早く食べているんですか？"}, {"lesson": "L14", "trad": "多久", "pinyin": "duōjiǔ", "pos": "Phrase", "ja": "どのぐらいの間", "ex_zh": "你學中文學了多久了？", "ex_py": "Nǐ xué Zhōngwén xué le duōjiǔ le?", "ex_ja": "中国語を勉強してどのくらいになりますか？"},
  {"lesson": "L14", "trad": "有意思", "pinyin": "yǒuyìsi", "pos": "Vs", "ja": "面白い", "ex_zh": "他的表演很有意思，我們大家看得很開心。", "ex_py": "Tā de biǎoyǎn hěn yǒuyìsi, wǒmen dàjiā kàn de hěn kāixīn.", "ex_ja": "彼の出し物はとても面白くて、みんなが喜んで見ていました。"}, {"lesson": "L15", "trad": "生肖", "pinyin": "shēngxiào", "pos": "N", "ja": "中国の動物の干支", "ex_zh": "我是2000年出生的，所以我的生肖是龍。", "ex_py": "Wǒ shì 2000 nián chūshēng de, suǒyǐ wǒ de shēngxiào shì lóng.", "ex_ja": "私は2000年生まれなので、干支は龍です。"}, {"lesson": "L15", "trad": "鼠/老鼠", "pinyin": "shǔ/lǎoshǔ", "pos": "N", "ja": "ねずみ", "ex_zh": "我在廚房看到一隻老鼠，嚇了一大跳！", "ex_py": "Wǒ zài chúfáng kàndào yī zhī lǎoshǔ, xià le yī dà tiào!", "ex_ja": "キッチンでネズミを見て、ひどく驚きました！"}, {"lesson": "L15", "trad": "虎/老虎", "pinyin": "hǔ/lǎohǔ", "pos": "N", "ja": "虎", "ex_zh": "動物園裡有一隻老虎，好多小孩都想去看。", "ex_py": "Dòngwùyuán lǐ yǒu yī zhī lǎohǔ, hǎo duō xiǎohái dōu xiǎng qù kàn.", "ex_ja": "動物園に虎が一匹いて、たくさんの子どもたちが見に行きたがっています。"}, {"lesson": "L15", "trad": "兔/兔子", "pinyin": "tù/tùzi", "pos": "N", "ja": "うさぎ", "ex_zh": "這隻兔子的毛很軟，摸起來很舒服。", "ex_py": "Zhè zhī tùzi de máo hěn ruǎn, mō qǐlái hěn shūfú.", "ex_ja": "このウサギの毛はとても柔らかく、触ると気持ちいいです。"},
  {"lesson": "L15", "trad": "蛇", "pinyin": "shé", "pos": "N", "ja": "蛇", "ex_zh": "我很怕蛇，一看到蛇就跑走了。", "ex_py": "Wǒ hěn pà shé, yī kàndào shé jiù pǎo zǒu le.", "ex_ja": "私はヘビがとても怖くて、見るとすぐに逃げてしまいます。"}, {"lesson": "L15", "trad": "馬", "pinyin": "mǎ", "pos": "N", "ja": "馬", "ex_zh": "她學了五年了，騎馬騎得很好。", "ex_py": "Tā xué le wǔ nián le, qí mǎ qí de hěn hǎo.", "ex_ja": "彼女は5年間習っていて、乗馬がとても上手です。"}, {"lesson": "L15", "trad": "羊", "pinyin": "yáng", "pos": "N", "ja": "ヤギ;羊", "ex_zh": "農場裡有很多羊，我們去的時候可以餵牠們吃東西。", "ex_py": "Nóngchǎng lǐ yǒu hěn duō yáng, wǒmen qù de shíhòu kěyǐ wèi tāmen chī dōngxi.", "ex_ja": "農場にはたくさんの羊がいて、行く時にえさをあげることができます。"}, {"lesson": "L15", "trad": "猴/猴子", "pinyin": "hòu/hòuzi", "pos": "N", "ja": "猿", "ex_zh": "動物園的猴子很活潑，非常有趣。", "ex_py": "Dòngwùyuán de hóuzi hěn huópō, fēicháng yǒuqù.", "ex_ja": "動物園のサルはとても活発で、とても面白いです。"}, {"lesson": "L15", "trad": "雞", "pinyin": "jī", "pos": "N", "ja": "オンドリ。チキン", "ex_zh": "早上常常聽到雞叫，我就知道天亮了。", "ex_py": "Zǎoshàng chángcháng tīngdào jī jiào, wǒ jiù zhīdào tiān liàng le.", "ex_ja": "朝よくニワトリの鳴き声が聞こえて、夜明けになったとわかります。"},
  {"lesson": "L15", "trad": "豬", "pinyin": "zhū", "pos": "N", "ja": "豚", "ex_zh": "豬很聰明，學習能力比很多動物強。", "ex_py": "Zhū hěn cōngmíng, xuéxí nénglì bǐ hěn duō dòngwù qiáng.", "ex_ja": "ブタはとても賢く、多くの動物より学習能力が高いです。"}, {"lesson": "L15", "trad": "屬", "pinyin": "shǔ", "pos": "Vst", "ja": "（干支など）に属する", "ex_zh": "1997年出生的人屬什麼生肖？", "ex_py": "1997 nián chūshēng de rén shǔ shénme shēngxiào?", "ex_ja": "1997年生まれの人の干支は何ですか？"}, {"lesson": "L15", "trad": "元宵節", "pinyin": "Yuánxiāojié", "pos": "N", "ja": "ランタンフェスティバル", "ex_zh": "元宵節燈會是華人新年的重要活動。", "ex_py": "Yuánxiāojié dēnghuì shì Huárén xīnnián de zhòngyào huódòng.", "ex_ja": "元宵節のランタン展示会は中国人の新年の重要なイベントです。"}, {"lesson": "L15", "trad": "燈會", "pinyin": "dēnghui", "pos": "N", "ja": "ランタン・ディスプレイ・カーニバル", "ex_zh": "元宵節燈會是華人新年的重要活動。", "ex_py": "Yuánxiāojié dēnghuì shì Huárén xīnnián de zhòngyào huódòng.", "ex_ja": "元宵節のランタン展示会は中国人の新年の重要なイベントです。"}, {"lesson": "L15", "trad": "燈籠", "pinyin": "dēnglóng", "pos": "N", "ja": "ランタン", "ex_zh": "元宵節的時候，很多人會提著燈籠慶祝。", "ex_py": "Yuánxiāojié de shíhòu, hěn duō rén huì tí zhe dēnglóng qìngzhù.", "ex_ja": "元宵節の時、多くの人が提灯を持ってお祝いします。"},
  {"lesson": "L15", "trad": "華人", "pinyin": "Huárén", "pos": "N", "ja": "中国人。中国民族の人", "ex_zh": "世界各地都有很多華人，他們保留了很多中國的傳統。", "ex_py": "Shìjiè gè dì dōu yǒu hěn duō Huárén, tāmen bǎoliú le hěn duō Zhōngguó de chuántǒng.", "ex_ja": "世界各地にたくさんの中国系の人々がいて、多くの中国の伝統を守っています。"}, {"lesson": "L15", "trad": "贏", "pinyin": "yíng", "pos": "Vp", "ja": "勝つために", "ex_zh": "我們隊昨天比賽贏了，大家都很高興。", "ex_py": "Wǒmen duì zuótiān bǐsài yíng le, dàjiā dōu hěn gāoxìng.", "ex_ja": "私たちのチームは昨日の試合に勝って、みんなとても喜んでいました。"}, {"lesson": "L15", "trad": "輸", "pinyin": "shū", "pos": "Vp", "ja": "失うこと", "ex_zh": "這次比賽我輸了，下次一定要更努力練習。", "ex_py": "Zhè cì bǐsài wǒ shū le, xià cì yīdìng yào gèng nǔlì liànxí.", "ex_ja": "今回の試合では負けましたが、次回はもっと一生懸命練習します。"}, {"lesson": "L15", "trad": "比賽", "pinyin": "bǐsài", "pos": "Vi", "ja": "競争する", "ex_zh": "學校下個月有一個中文比賽，你要不要參加？", "ex_py": "Xuéxiào xià ge yuè yǒu yī ge Zhōngwén bǐsài, nǐ yào bú yào cānjiā?", "ex_ja": "来月学校で中国語大会があるのですが、参加しませんか？"}, {"lesson": "L15", "trad": "受歡迎", "pinyin": "shòu huānyíng", "pos": "Phrase", "ja": "好評。人気のある", "ex_zh": "這個老師教得很好，在學生中非常受歡迎。", "ex_py": "Zhège lǎoshī jiāo de hěn hǎo, zài xuéshēng zhōng fēicháng shòu huānyíng.", "ex_ja": "この先生はとても教え方が上手で、生徒たちに非常に人気があります。"},
  {"lesson": "L15", "trad": "其他", "pinyin": "qítā", "pos": "Det", "ja": "他の;残り", "ex_zh": "除了你以外，其他同學都來了。", "ex_py": "Chúle nǐ yǐwài, qítā tóngxué dōu lái le.", "ex_ja": "あなた以外の他の同学は全員来ました。"}, {"lesson": "L15", "trad": "一樣", "pinyin": "yīyàng", "pos": "Vs", "ja": "同じ", "ex_zh": "你的看法跟我的一樣，我也覺得這個電影很好看。", "ex_py": "Nǐ de kànfǎ gēn wǒ de yīyàng, wǒ yě juéde zhège diànyǐng hěn hǎokàn.", "ex_ja": "あなたの意見は私と同じで、私もこの映画はとても面白いと思います。"}, {"lesson": "L15", "trad": "小孩", "pinyin": "xiǎoháir", "pos": "N", "ja": "子供;子供たち", "ex_zh": "最近感冒的人很多，大人、小孩都應該多注意身體。", "ex_py": "Zuìjìn gǎnmào de rén hěn duō, dàrén, xiǎohái dōu yīnggāi duō zhùyì shēntǐ.", "ex_ja": "最近風邪をひいている人が多く、大人も子どもも体に気をつけるべきです。"}, {"lesson": "L15", "trad": "大人", "pinyin": "dàrén", "pos": "N", "ja": "大人", "ex_zh": "最近感冒的人很多，大人、小孩都應該多注意身體。", "ex_py": "Zuìjìn gǎnmào de rén hěn duō, dàrén, xiǎohái dōu yīnggāi duō zhùyì shēntǐ.", "ex_ja": "最近風邪をひいている人が多く、大人も子どもも体に気をつけるべきです。"}, {"lesson": "L15", "trad": "原來", "pinyin": "yuánlái", "pos": "Adv", "ja": "（真実の発見を示して）それは...", "ex_zh": "原來你會說中文，我真的不知道！", "ex_py": "Yuánlái nǐ huì shuō Zhōngwén, wǒ zhēn de bù zhīdào!", "ex_ja": "あなたが中国語を話せるとは、本当に知りませんでした！"},
  {"lesson": "L15", "trad": "剛才", "pinyin": "gāngcái", "pos": "Adv", "ja": "ちょうど今;少し前に", "ex_zh": "我剛才給你打電話了，你在哪裡？", "ex_py": "Wǒ gāngcái gěi nǐ dǎ diànhuà le, nǐ zài nǎlǐ?", "ex_ja": "さっきあなたに電話しましたが、どこにいましたか？"}, {"lesson": "L15", "trad": "希望", "pinyin": "xīwàng", "pos": "Vst", "ja": "希望する", "ex_zh": "我希望明年能去台灣旅行。", "ex_py": "Wǒ xīwàng míngnián néng qù Táiwān lǚxíng.", "ex_ja": "来年台湾に旅行できることを希望しています。"}, {"lesson": "L15", "trad": "排", "pinyin": "pái", "pos": "V", "ja": "並ぶこと。順番に並べる", "ex_zh": "請大家排好，一個一個進去。", "ex_py": "Qǐng dàjiā pái hǎo, yī ge yī ge jìn qù.", "ex_ja": "みなさんきちんと並んでください、一人ずつ入ります。"}, {"lesson": "L15", "trad": "湖", "pinyin": "hú", "pos": "N", "ja": "湖", "ex_zh": "日月潭是台灣最有名的湖，景色非常美。", "ex_py": "Rìyuètán shì Táiwān zuì yǒumíng de hú, jǐngsè fēicháng měi.", "ex_ja": "日月潭は台湾で最も有名な湖で、景色がとても美しいです。"}, {"lesson": "L15", "trad": "越南", "pinyin": "Yuénán", "pos": "N", "ja": "ベトナム", "ex_zh": "越南和台灣都是亞洲的國家，文化有很多不一樣的地方。", "ex_py": "Yuènán hé Táiwān dōu shì Yàzhōu de guójiā, wénhuà yǒu hěn duō bù yīyàng de dìfāng.", "ex_ja": "ベトナムと台湾はどちらもアジアの国で、文化には多くの異なる点があります。"},
  {"lesson": "L15", "trad": "動物", "pinyin": "dòngwù", "pos": "N", "ja": "動物", "ex_zh": "她很喜歡小動物，想要有一隻小狗。", "ex_py": "Tā hěn xǐhuān xiǎo dòngwù, xiǎng yào yǒu yī zhī xiǎo gǒu.", "ex_ja": "彼女は小動物が大好きで、子犬を飼いたがっています。"}, {"lesson": "L16", "trad": "旅行", "pinyin": "lǚxíng", "pos": "Vi", "ja": "旅行する。旅行に行く", "ex_zh": "我喜歡去旅行，因為可以認識很多有趣的人。", "ex_py": "Wǒ xǐhuān qù lǚxíng, yīnwèi kěyǐ rènshì hěn duō yǒuqù de rén.", "ex_ja": "旅行が好きです。たくさんの面白い人と出会えるからです。"}, {"lesson": "L16", "trad": "高鐵", "pinyin": "Gāotiě", "pos": "N", "ja": "高速鉄道", "ex_zh": "聽說高鐵很快，你搭過沒有？", "ex_py": "Tīngshuō gāotiě hěn kuài, nǐ dā guò méi yǒu?", "ex_ja": "高速鉄道はとても速いと聞きましたが、乗ったことはありますか？"}, {"lesson": "L16", "trad": "台灣高鐵", "pinyin": "Táiwān Gāotiě", "pos": "N", "ja": "台湾高速鉄道", "ex_zh": "搭台灣高鐵從台北到高雄只要九十分鐘。", "ex_py": "Dā Táiwān Gāotiě cóng Táiběi dào Gāoxióng zhǐyào jiǔshí fēnzhōng.", "ex_ja": "台湾高速鉄道に乗れば台北から高雄まで90分しかかかりません。"}, {"lesson": "L16", "trad": "太魯閣", "pinyin": "Tàilǔgé", "pos": "N", "ja": "太魯閣", "ex_zh": "我上個月去太魯閣，那裡的風景非常漂亮。", "ex_py": "Wǒ shàng ge yuè qù Tàilǔgé, nàlǐ de fēngjǐng fēicháng piàoliang.", "ex_ja": "先月太魯閣へ行きました。あそこの風景はとても美しいです。"},

// 課ごとの単語数を集計
const lessonCounts = {};
VOCAB.forEach(v => {
  lessonCounts[v.lesson] = (lessonCounts[v.lesson] || 0) + 1;
});

const lessons = Object.keys(lessonCounts).sort();
const selectedLessons = new Set();

// 課選択ボタン生成
const grid = document.getElementById('lesson-grid');
lessons.forEach(lesson => {
  const btn = document.createElement('button');
  btn.className = 'lesson-btn';
  const label = lesson === 'L00' ? '基礎' : lesson.replace('L', '第') + '課';
  btn.innerHTML = `${label}<span class="count">${lessonCounts[lesson]}語</span>`;
  btn.onclick = () => selectLesson(lesson);
  btn.dataset.lesson = lesson;
  grid.appendChild(btn);
});

function selectLesson(lesson) {
  selectedLessons.clear();
  selectedLessons.add(lesson);
  startStudy(false);
}

// ===== 学習ロジック =====
let cards = [], currentIndex = 0, isFlipped = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startStudy() {
  cards = shuffle(VOCAB.filter(v => selectedLessons.has(v.lesson)));
  currentIndex = 0;
  showScreen('screen-card');
  showCard();
}

function showCard() {
  const card = cards[currentIndex];
  isFlipped = false;
  const cardInner = document.getElementById('card-inner');
  cardInner.style.transition = 'none';
  cardInner.classList.remove('flipped');
  cardInner.offsetHeight; // reflow で即時反映
  cardInner.style.transition = '';
  document.getElementById('flip-hint').textContent = 'タップして答えを見る';
  document.getElementById('flip-hint').style.display = '';

  const total = cards.length;
  const done = currentIndex;
  document.getElementById('progress-bar').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;

  const lessonLabel = card.lesson === 'L00' ? '基礎' : card.lesson.replace('L', '第') + '課';
  document.getElementById('card-lesson').textContent = lessonLabel;
  document.getElementById('card-chinese').textContent = card.trad;
  document.getElementById('card-pos-back').textContent = card.pos;
  document.getElementById('card-lesson-back').textContent = lessonLabel;
  document.getElementById('card-chinese-back').textContent = card.trad;
  document.getElementById('card-pinyin').textContent = card.pinyin;
  document.getElementById('card-ja').textContent = card.ja;
  const exEl = document.getElementById('card-example');
  if (card.ex_zh) {
    exEl.innerHTML =
      `<div class="ex-zh">${card.ex_zh}</div>` +
      `<div class="ex-py">${card.ex_py}</div>` +
      `<div class="ex-ja">${card.ex_ja}</div>`;
    exEl.style.display = 'block';
  } else {
    exEl.innerHTML = '';
    exEl.style.display = 'none';
  }
  const container = document.querySelector('.card-container');
  container.style.height = '300px';
  speak();
}

function flipCard() {
  if (!isFlipped) {
    isFlipped = true;
    document.getElementById('card-inner').classList.add('flipped');
    document.getElementById('flip-hint').textContent = 'タップして次へ';

    // card-back の自然な高さを計測してコンテナに適用
    const container = document.querySelector('.card-container');
    const cardBack = document.querySelector('.card-back');
    const savedPosition = cardBack.style.position;
    const savedHeight = cardBack.style.height;
    const savedTransform = cardBack.style.transform;
    const savedVisibility = cardBack.style.visibility;
    cardBack.style.position = 'relative';
    cardBack.style.height = 'auto';
    cardBack.style.transform = 'none';
    cardBack.style.visibility = 'hidden';
    const backHeight = cardBack.offsetHeight;
    cardBack.style.position = savedPosition;
    cardBack.style.height = savedHeight;
    cardBack.style.transform = savedTransform;
    cardBack.style.visibility = savedVisibility;
    container.style.height = Math.max(300, backHeight) + 'px';

    const card = cards[currentIndex];
    if (card.ex_zh) {
      const utter = new SpeechSynthesisUtterance(card.ex_zh);
      utter.lang = 'zh-TW';
      utter.rate = 0.8;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }
  } else {
    currentIndex++;
    if (currentIndex >= cards.length) {
      showScreen('screen-result');
    } else {
      showCard();
    }
  }
}

function speak() {
  const text = cards[currentIndex].trad;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function speakExample() {
  const card = cards[currentIndex];
  if (!card.ex_zh) return;
  const utter = new SpeechSynthesisUtterance(card.ex_zh);
  utter.lang = 'zh-TW';
  utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function retryAll() { startStudy(); }
function goSelect() { showScreen('screen-select'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
